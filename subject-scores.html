<!DOCTYPE html>

    <style>
        :root { --primary: #0054a6; --secondary: #3b82f6; }
        
        @font-face {
            font-family: 'Tacteing';
            src: local('Tacteing'); 
        }

        body { font-family: 'Battambang', cursive; background: #f0f4f8; min-height: 100vh; margin: 0; }
        .kh-moul { font-family: 'Moul', cursive; }
        
        /* Background Animation */
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 10% 20%, #e0e7ff 0%, transparent 40%), radial-gradient(circle at 90% 80%, #dcfce7 0%, transparent 40%), radial-gradient(circle at 50% 50%, #fef3c7 0%, transparent 40%); opacity: 0.6; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { height: 12px; width: 12px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; border: 3px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Sticky Columns Configuration */
        .sticky-col-1 { position: sticky; left: 0; z-index: 40; background-color: white; border-right: 1px solid #e2e8f0; }
        .sticky-col-2 { position: sticky; left: 50px; z-index: 40; background-color: white; border-right: 2px solid #cbd5e1; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        
        /* Sticky Header */
        thead { position: sticky; top: 0; z-index: 50; }
        
        /* Ensure sticky headers sit above sticky columns */
        thead th { position: sticky; top: 0; z-index: 50; }
        thead th.sticky-col-1 { z-index: 60; }
        thead th.sticky-col-2 { z-index: 60; }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

        /* Hover Effects */
        tr:hover td { background-color: #f0f9ff; }
        tr:hover td.sticky-col-1, tr:hover td.sticky-col-2 { background-color: #f0f9ff; }
        
        input:focus { background-color: #dbeafe !important; font-weight: bold; color: #1e40af; }
        select:focus { background-color: #dcfce7 !important; font-weight: bold; }
        
        /* Transition for rank updates */
        .rank-cell { transition: all 0.3s ease; }
        .grade-cell { transition: all 0.3s ease; }

        /* Toggle Buttons */
        .type-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 700;
            transition: all 0.3s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .type-btn.active {
            background-color: #0054a6;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 84, 166, 0.2);
        }
        .type-btn.inactive {
            background-color: white;
            color: #64748b;
            border-color: #e2e8f0;
        }
        .type-btn.inactive:hover {
            border-color: #0054a6;
            color: #0054a6;
        }

        /* Form Selects */
        .form-select {
            padding: 0.5rem 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            outline: none;
            background: white;
            font-family: 'Battambang', cursive;
            font-size: 0.875rem;
            font-weight: 700;
            color: #1e293b;
            cursor: pointer;
        }
        .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0, 84, 166, 0.1); }
        
        /* Custom Checkbox Card */
        .month-card-input:checked + .month-card-content {
            background-color: #f0f9ff;
            border-color: #0054a6;
            color: #0054a6;
            box-shadow: 0 4px 6px -1px rgba(0, 84, 166, 0.1), 0 2px 4px -1px rgba(0, 84, 166, 0.06);
        }
        .month-card-input:checked + .month-card-content .check-icon {
            display: block;
        }

</head>
<body class="text-slate-800">

        async function loadCustomSubjects() {
            try {
                if (currentUser) {

                    const snap = await getDoc(docRef);
                    if (snap.exists()) {

                    const local = localStorage.getItem('custom_subjects');

            injectCustomSubjects();

        function injectCustomSubjects() {
            if (!customSubjects || customSubjects.length === 0) return;
            
            let monthlyCustomCols = [];
            let semesterCustomCols = [];

            customSubjects.forEach(sub => {
                sub.columns.forEach(col => {
                    const newCol = { key: col.id, label: col.label, color: 'bg-purple-600/90' };
                    // Add to monthly if applicable
                    if (sub.type === 'both' || sub.type === 'monthly') {
                        if (!config.monthly.columns.find(c => c.key === col.id)) {
                            monthlyCustomCols.push(newCol);
                        }
                    }
                    // Add to semester if applicable
                    if (sub.type === 'both' || sub.type === 'semester') {
                        if (!config.semester.columns.find(c => c.key === col.id)) {
                            semesterCustomCols.push(newCol);
                        }
                    }
                });
            });

            if (monthlyCustomCols.length > 0) {
                config.monthly.columns.push(...monthlyCustomCols);
                let customGroup = config.monthly.groups.find(g => g.name === 'មុខវិជ្ជាបន្ថែម');
                if (customGroup) customGroup.cols += monthlyCustomCols.length;

            }

            if (semesterCustomCols.length > 0) {
                config.semester.columns.push(...semesterCustomCols);
                let customGroup = config.semester.groups.find(g => g.name === 'មុខវិជ្ជាបន្ថែម');

        // --- CORE LOGIC ---
        function getMonthlyAverageForStudent(studentId) {
            if (!selectedSemesterMonths || selectedSemesterMonths.length === 0) return 0;
            let sumOfAverages = 0;

            selectedSemesterMonths.forEach(month => {
                const scoresData = allMonthsScoresCache[month] || {};
                const studentData = scoresData[studentId];
                
                if (studentData) {
                    if (studentData.results && studentData.results.average !== undefined) {
                        sumOfAverages += parseFloat(studentData.results.average) || 0;
                    } else {
                        let studentScores = studentData.hasOwnProperty('scores') ? studentData.scores : studentData;
                        let mSum = 0;
                        let mCount = 0;
                        config.monthly.columns.forEach(col => {
                            if(col.isText) return; 
                            const val = studentScores[col.key];
                            if (val !== null && val !== undefined && val !== "") {
                                const numVal = parseFloat(val);
                                if (!isNaN(numVal)) {
                                    mSum += numVal;
                                    mCount++;
                                }
                            }
                        });
                        if (mCount > 0) {
                            sumOfAverages += (mSum / mCount);
                        }
                    }
                }
            });
            return sumOfAverages / selectedSemesterMonths.length;
        }

        function calculateRow(student) {
            let sum = 0;
            let scoredSubjectsCount = 0;

            currentColumns.forEach(col => {
                if(col.isText) return;
                const rawVal = student.scores[col.key];
                if (rawVal !== null && rawVal !== undefined && rawVal !== "") {
                    const val = parseFloat(rawVal);
                    if (!isNaN(val)) {
                        sum += val;
                        scoredSubjectsCount++;
                    }
                }
            });
            
            if (currentMode === 'monthly') {
                student.total = sum;
                student.average = scoredSubjectsCount > 0 ? (sum / scoredSubjectsCount).toFixed(2) : "0.00";
                student.finalAverageForRank = parseFloat(student.average);
            } else if (currentMode === 'annual') {
                const s1 = parseFloat(student.scores['sem1_avg']);
                const s2 = parseFloat(student.scores['sem2_avg']);
                const val1 = isNaN(s1) ? 0 : s1;
                const val2 = isNaN(s2) ? 0 : s2;
                
                student.annualTotal = val1 + val2;
                student.annualAverage = ((val1 + val2) / 2).toFixed(2);
                student.finalAverageForRank = parseFloat(student.annualAverage);
                
                student.total = student.annualTotal;
                student.average = student.annualAverage;
            } else { // semester
                student.examTotal = sum;
                student.examAverage = scoredSubjectsCount > 0 ? (sum / scoredSubjectsCount).toFixed(2) : "0.00";
                
                const monthlyAvg = getMonthlyAverageForStudent(student.id);
                student.monthlyAverage = monthlyAvg.toFixed(2);
                
                let semAvg = (parseFloat(student.examAverage) + monthlyAvg) / 2;
                if (scoredSubjectsCount === 0 && monthlyAvg === 0) semAvg = 0;
                
                student.semesterAverage = semAvg.toFixed(2);
                student.finalAverageForRank = semAvg;
                
                student.total = student.examTotal;
                student.average = student.semesterAverage;
            }

            const avgForGrade = student.finalAverageForRank;
            if (avgForGrade >= 9.0) student.grade = 'A';
            else if (avgForGrade >= 8.0) student.grade = 'B';
            else if (avgForGrade >= 7.0) student.grade = 'C';
            else if (avgForGrade >= 6.0) student.grade = 'D';
            else if (avgForGrade >= 5.0) student.grade = 'E';
            else student.grade = 'F';
        }

        function calculateAllRanks() {
            const sorted = [...students].sort((a, b) => b.finalAverageForRank - a.finalAverageForRank);
            let currentRank = 1;
            for (let i = 0; i < sorted.length; i++) {
                if (i > 0 && sorted[i].finalAverageForRank < sorted[i-1].finalAverageForRank) {
                    currentRank = i + 1;
                }
                const original = students.find(s => s.id === sorted[i].id);
                if(original) original.rank = currentRank;
            }
        }

        window.updateMonthOptions = function() {
            const yearVal = document.getElementById('yearSelect').value;
            if (!yearVal || !yearVal.includes('-')) return;
            
            const [startYear, endYear] = yearVal.split('-');
            const monthSelect = document.getElementById('monthSelect');
            let currentMonthVal = monthSelect.value;

            if (!currentMonthVal) {
                const currentMonthIndex = new Date().getMonth();
                const jsMonthToId = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
                currentMonthVal = jsMonthToId[currentMonthIndex];
            }

            let optionsHTML = '';
            allMonthsMap.forEach(m => {
                const y = m.isNextYear ? endYear : startYear;
                const selected = m.id === currentMonthVal ? 'selected' : '';
                optionsHTML += `<option value="${m.id}" ${selected}>ខែ${m.label} ឆ្នាំ ${y}</option>`;
            });

            monthSelect.innerHTML = optionsHTML;
            
            if (currentMonthVal) {
                monthSelect.value = currentMonthVal;
            }
        }

            const semesterContainer = document.getElementById('semesterContainer');
            
            const btnMonthly = document.getElementById('btnMonthly');
            const btnSemester = document.getElementById('btnSemester');
            const btnAnnual = document.getElementById('btnAnnual');

            // Reset buttons to inactive
            [btnMonthly, btnSemester, btnAnnual].forEach(btn => {
                btn.classList.add('inactive');
                btn.classList.remove('active');
            });

            if (mode === 'monthly') {
                monthContainer.classList.remove('hidden');
                semesterContainer.classList.add('hidden');
                semesterContainer.classList.remove('flex');
                
                btnMonthly.classList.add('active'); btnMonthly.classList.remove('inactive');
                window.loadData();
            } else if (mode === 'semester') {
                monthContainer.classList.add('hidden');
                semesterContainer.classList.remove('hidden');
                semesterContainer.classList.add('flex');

                btnSemester.classList.add('active'); btnSemester.classList.remove('inactive');

            } else if (mode === 'annual') {
                monthContainer.classList.add('hidden');
                semesterContainer.classList.add('hidden');
                semesterContainer.classList.remove('flex');

                btnAnnual.classList.add('active'); btnAnnual.classList.remove('inactive');

            if (currentUser) {
                try {
                    const settingsRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'settings', 'preferences');
                    const settingsSnap = await getDoc(settingsRef);
                    if (settingsSnap.exists() && settingsSnap.data()[storageKey]) {
                        selectedSemesterMonths = settingsSnap.data()[storageKey];
                        foundInCloud = true;
                    }
                } catch (error) {
                    console.error("Error loading settings from Cloud:", error);
                }
            }
            
            // ២. បើអត់មាននៅ Cloud ទេ ទាញពី LocalStorage (Backup) ឬប្រើ Default
            if (!foundInCloud) {
                const savedMonths = localStorage.getItem(storageKey);
                if (savedMonths) {
                    selectedSemesterMonths = JSON.parse(savedMonths);
                } else {
                    selectedSemesterMonths = defaultSemesterMonths[sem];
                }
            }
            
            updateMonthCountBadge();
            await window.loadData();
        }

        window.loadData = async function() {
            showLoading(true);
            updateMonthCountBadge();
            const conf = config[currentMode];
            currentColumns = conf.columns;
            renderTableHeader(conf);

            try {
                let loadedStudents = [];
                if (currentUser) {
                    const studentsRef = collection(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'students');
                    const studentsSnap = await getDocs(studentsRef);
                    studentsSnap.forEach(doc => {
                        loadedStudents.push({ id: doc.id, ...doc.data() });
                    });
                }
                
                if (loadedStudents.length === 0) {
                    const studentsRaw = localStorage.getItem('students_db') || localStorage.getItem('students');
                    if (studentsRaw) loadedStudents = JSON.parse(studentsRaw);
                }

                let parsedScores = {};
                const docId = getStorageKey();
                
                if (currentUser) {
                    const scoresRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'scores', docId);
                    const scoresSnap = await getDoc(scoresRef);
                    if (scoresSnap.exists()) {
                        parsedScores = scoresSnap.data();
                    } else {
                        const oldSnap = await getDoc(doc(db, "scores", docId)).catch(() => null);
                        if (oldSnap && oldSnap.exists()) parsedScores = oldSnap.data();
                    }
                }
                
                if (Object.keys(parsedScores).length === 0) {
                    const localScores = localStorage.getItem(`scores_${docId}`);
                    if (localScores) parsedScores = JSON.parse(localScores);
                }

                // -----------------------------------------------------
                // Auto-fetch semester 1 and 2 averages for Annual mode
                // -----------------------------------------------------
                if (currentMode === 'annual') {
                    const year = document.getElementById('yearSelect').value;
                    let sem1Data = {};
                    let sem2Data = {};
                    
                    try {
                        if (currentUser) {
                            const s1Snap = await getDoc(doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'scores', `${year}_sem1`));
                            if(s1Snap.exists()) sem1Data = s1Snap.data();
                            
                            const s2Snap = await getDoc(doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'scores', `${year}_sem2`));
                            if(s2Snap.exists()) sem2Data = s2Snap.data();
                        }
                    } catch(e) { console.error(e); }
                    
                    if(Object.keys(sem1Data).length === 0) {
                        const ls = localStorage.getItem(`scores_${year}_sem1`);
                        if(ls) sem1Data = JSON.parse(ls);
                    }
                    if(Object.keys(sem2Data).length === 0) {
                        const ls = localStorage.getItem(`scores_${year}_sem2`);
                        if(ls) sem2Data = JSON.parse(ls);
                    }
                    
                    loadedStudents.forEach(s => {
                        let dbRecord = parsedScores[s.id] || {};
                        let stScores = dbRecord.hasOwnProperty('scores') ? dbRecord.scores : dbRecord;
                        
                        // យកពិន្ទុឆមាសទី១ មកដាក់ដោយស្វ័យប្រវត្តិ បើមិនទាន់មានទិន្នន័យ
                        if (stScores['sem1_avg'] === null || stScores['sem1_avg'] === undefined || stScores['sem1_avg'] === "") {
                            if (sem1Data[s.id] && sem1Data[s.id].results && sem1Data[s.id].results.semesterAverage) {
                                stScores['sem1_avg'] = sem1Data[s.id].results.semesterAverage;
                            }
                        }
                        // យកពិន្ទុឆមាសទី២ មកដាក់ដោយស្វ័យប្រវត្តិ បើមិនទាន់មានទិន្នន័យ
                        if (stScores['sem2_avg'] === null || stScores['sem2_avg'] === undefined || stScores['sem2_avg'] === "") {
                            if (sem2Data[s.id] && sem2Data[s.id].results && sem2Data[s.id].results.semesterAverage) {
                                stScores['sem2_avg'] = sem2Data[s.id].results.semesterAverage;
                            }
                        }
                        
                        if (!parsedScores[s.id]) {
                            parsedScores[s.id] = { scores: stScores };
                        } else if (!parsedScores[s.id].scores) {
                            parsedScores[s.id].scores = stScores;
                        }
                    });
                }
                
                allMonthsScoresCache = {};
                if (currentMode === 'semester') {
                    const year = document.getElementById('yearSelect').value;
                    
                    await Promise.all(selectedSemesterMonths.map(async (month) => {
                        const mDocId = `${year}_${month}`;
                        let mData = {};
                        
                        if (currentUser) {
                            const mRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'scores', mDocId);
                            const mSnap = await getDoc(mRef);
                            
                            if (mSnap.exists()) {
                                mData = mSnap.data();
                            } else {
                                const oldSnap = await getDoc(doc(db, "scores", mDocId)).catch(() => null);
                                if (oldSnap && oldSnap.exists()) mData = oldSnap.data();
                            }
                        }
                        
                        if (Object.keys(mData).length === 0) {
                            const localData = localStorage.getItem(`scores_${mDocId}`);
                            if (localData) mData = JSON.parse(localData);
                        }
                        
                        allMonthsScoresCache[month] = mData;
                    }));
                }

                students = loadedStudents.map(s => {
                    let dbRecord = parsedScores[s.id] || {};
                    let studentScores = dbRecord.hasOwnProperty('scores') ? dbRecord.scores : dbRecord;
                    
                    currentColumns.forEach(col => {
                        if (studentScores[col.key] === undefined) studentScores[col.key] = null;
                    });
                    
                    return {
                        id: s.id, name: s.name, gender: s.gender || '',
                        scores: studentScores,
                        total: 0, average: 0, examTotal: 0, examAverage: 0,
                        monthlyAverage: 0, semesterAverage: 0, 
                        annualTotal: 0, annualAverage: 0,
                        finalAverageForRank: 0,
                        rank: 0, grade: 'F'
                    };
                });

                students.forEach(s => calculateRow(s));
                calculateAllRanks();
                renderTableBody();

            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('cloudStatus').innerHTML = '<i data-lucide="wifi-off" class="w-3 h-3 text-red-500"></i> Offline Mode';
                lucide.createIcons();
            } finally {
                showLoading(false);
            }
        }

        window.updateScoreText = function(index, subject, value) {
            const student = students[index];
            student.scores[subject] = value;
        }

        window.updateScore = function(index, subject, value) {
            const student = students[index];
            const numVal = value === '' ? null : parseFloat(value);
            student.scores[subject] = numVal;
            
            calculateRow(student);
            
            if (currentMode === 'monthly') {
                document.getElementById(`total-${index}`).innerText = formatKhmerNumber(student.total);
                document.getElementById(`avg-${index}`).innerText = formatKhmerNumber(student.average);
            } else if (currentMode === 'annual') {
                document.getElementById(`annAvg-${index}`).innerText = formatKhmerNumber(student.annualAverage);
            } else { // semester
                document.getElementById(`examTotal-${index}`).innerText = formatKhmerNumber(student.examTotal);
                document.getElementById(`examAvg-${index}`).innerText = formatKhmerNumber(student.examAverage);
                document.getElementById(`monthlyAvg-${index}`).innerText = formatKhmerNumber(student.monthlyAverage);
                document.getElementById(`semAvg-${index}`).innerText = formatKhmerNumber(student.semesterAverage);
            }
            
            const gradeEl = document.getElementById(`grade-${index}`);
            gradeEl.innerText = student.grade;
            gradeEl.className = `p-2 text-center font-extrabold border border-yellow-200 grade-cell ${getGradeColor(student.grade)}`;

            calculateAllRanks();

            students.forEach(s => {
                const rankEl = document.getElementById(`rank-${s.id}`);
                if (rankEl) {
                    if (rankEl.innerText != s.rank) {
                        rankEl.style.backgroundColor = '#fef08a';
                        setTimeout(() => rankEl.style.backgroundColor = '', 300);
                    }
                    rankEl.innerText = s.rank;
                }
            });
        }

        window.saveScores = async function() {
            const btn = document.querySelector('button[onclick="saveScores()"]');
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> កំពុងរក្សាទុក...';
            lucide.createIcons();

            const scoresToSave = {};
            students.forEach(s => { 
                scoresToSave[s.id] = {
                    scores: s.scores,
                    results: {
                        total: s.total,
                        average: s.average,
                        examTotal: s.examTotal,
                        examAverage: s.examAverage,
                        monthlyAverage: s.monthlyAverage,
                        semesterAverage: s.semesterAverage,
                        annualTotal: s.annualTotal,
                        annualAverage: s.annualAverage,
                        rank: s.rank,
                        grade: s.grade
                    }
                }; 
            });
            const docId = getStorageKey();

            try {
                if (currentUser) {
                    const scoresRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'scores', docId);
                    await setDoc(scoresRef, scoresToSave, { merge: true });
                }
                
                localStorage.setItem(`scores_${docId}`, JSON.stringify(scoresToSave));
                
                setTimeout(() => {
                    btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> រួចរាល់!';
                    btn.classList.replace('bg-[#0054a6]', 'bg-green-600');
                    btn.classList.replace('hover:bg-[#1e40af]', 'hover:bg-green-700');
                    lucide.createIcons();

                    setTimeout(() => {
                        btn.innerHTML = originalHTML;
                        btn.classList.replace('bg-green-600', 'bg-[#0054a6]');
                        btn.classList.replace('hover:bg-green-700', 'hover:bg-[#1e40af]');
                        lucide.createIcons();
                    }, 1500);
                }, 500);
            } catch (error) {
                console.error("Error saving: ", error);
                btn.innerHTML = '<i data-lucide="x" class="w-4 h-4"></i> បរាជ័យ!';
                btn.classList.replace('bg-[#0054a6]', 'bg-red-600');
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('bg-red-600', 'bg-[#0054a6]');
                    lucide.createIcons();
                }, 2000);
            }
        }

        // --- MONTH SELECTOR MODAL ---
        window.openMonthSelectorModal = function() {
            const modal = document.getElementById('monthSelectorModal');
            const content = document.getElementById('modalContent');
            const grid = document.getElementById('modalMonthsGrid');
            const semText = document.getElementById('semesterSelect').options[document.getElementById('semesterSelect').selectedIndex].text;
            const yearText = document.getElementById('yearSelect').value;
            document.getElementById('modalSubtitle').innerText = `${semText} ឆ្នាំសិក្សា ${yearText}`;

            const [startYear, endYear] = yearText.split('-');
            let html = '';
            allMonthsMap.forEach(m => {
                const isChecked = selectedSemesterMonths.includes(m.id);
                const year = m.isNextYear ? endYear : startYear;
                html += `
                    <label class="cursor-pointer relative group">
                        <input type="checkbox" value="${m.id}" class="month-card-input peer sr-only" onchange="window.updateLiveCount()" ${isChecked ? 'checked' : ''}>
                        <div class="month-card-content p-4 border border-slate-200 bg-white rounded-2xl text-center transition-all hover:bg-slate-50 text-slate-600 h-full flex flex-col justify-center items-center gap-1">
                            <i data-lucide="check-circle-2" class="check-icon hidden absolute top-2 right-2 w-4 h-4 text-[#0054a6]"></i>
                            <div class="font-bold text-lg kh-moul">${m.label}</div>
                            <div class="text-xs font-medium opacity-70">${year}</div>
                        </div>
                    </label>
                `;
            });
            grid.innerHTML = html;
            lucide.createIcons();
            window.updateLiveCount();

            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
        }

        window.closeMonthSelectorModal = function() {
            const modal = document.getElementById('monthSelectorModal');
            const content = document.getElementById('modalContent');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 200);
        }

        window.updateLiveCount = function() {
            const checkedBoxes = document.querySelectorAll('.month-card-input:checked');
            document.getElementById('liveMonthCount').innerText = checkedBoxes.length;
        }

        // រក្សាទុកខែដែលបានជ្រើសរើសទៅក្នុង Firebase Cloud Database និង LocalStorage ជា Backup
        window.applyMonthSelection = async function() {
            const checkedBoxes = document.querySelectorAll('.month-card-input:checked');
            const newSelection = Array.from(checkedBoxes).map(cb => cb.value);
            if (newSelection.length === 0) { alert("សូមជ្រើសរើសយ៉ាងហោចណាស់មួយខែ!"); return; }
            
            selectedSemesterMonths = newSelection;
            
            const year = document.getElementById('yearSelect').value;
            const sem = document.getElementById('semesterSelect').value;
            const storageKey = `selected_months_${year}_${sem}`;
            
            // ១. សន្សំទុកការកំណត់ក្នុង LocalStorage ជា Backup
            localStorage.setItem(storageKey, JSON.stringify(selectedSemesterMonths));

            // ២. រក្សាទុកចូល Firebase Online
            if (currentUser) {
                try {
                    // បង្ហាញសញ្ញា Loading លើប៊ូតុងពេលកំពុង Save
                    const btn = document.querySelector('button[onclick="applyMonthSelection()"]');
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> កំពុងរក្សាទុក...';
                    lucide.createIcons();

                    const settingsRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'settings', 'preferences');
                    await setDoc(settingsRef, {
                        [storageKey]: selectedSemesterMonths
                    }, { merge: true });

                    btn.innerHTML = originalHTML;
                    lucide.createIcons();
                } catch (error) {
                    console.error("Error saving settings to Cloud:", error);
                }
            }

            window.closeMonthSelectorModal();
            window.loadData(); 
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            window.updateMonthOptions();

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    await loadCustomSubjects(); // ដំណើរការទាញយកមុខវិជ្ជាបន្ថែម
                    await window.loadData();
                } else {
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.error("Auth Error:", error);
                        await loadCustomSubjects(); // ដំណើរការទាញយកមុខវិជ្ជាបន្ថែម
                        await window.loadData();
                    }
                }
            });
        });
    </script>
</body>
