<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTEC - បោះពុម្ពកាតសិស្ស</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            font-family: 'Battambang', cursive; 
            background-color: #f3f4f6; 
            color: #1f2937;
            min-height: 100vh; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
        }
        .kh-moul { font-family: 'Moul', cursive; font-weight: normal; }
        
        /* Loading Overlay */
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }

        /* Card Setup (A6 format scaled for A4 printing) */
        .student-card {
            width: 100mm;
            height: 140mm;
            position: relative;
            background-color: white;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 0 auto;
        }

        .card-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 0;
        }

        .card-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
        }
        
        /* Grid container for cards on screen */
        #cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100mm, 1fr));
            gap: 1.5rem;
            padding: 1.5rem;
            justify-items: center;
        }

        /* --- Print Specific Styles (Fixes 4 cards per A4 page) --- */
        @media print {
            @page { 
                size: A4 portrait; 
                margin: 4mm; /* Tight margin to ensure 2x2 grid fits perfectly */
            }
            
            body { 
                background-color: white !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; /* Ensure background prints */
            }
            
            .no-print { display: none !important; }
            #loadingOverlay { display: none !important; }
            
            /* Override tailwind container limiting width */
            .container {
                max-width: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            /* Force 2 columns Grid for printing */
            #cards-container {
                display: grid !important;
                grid-template-columns: 100mm 100mm !important; /* Exactly 2 columns */
                gap: 2mm !important; /* Slight gap for cutlines */
                padding: 0 !important;
                justify-content: center !important;
                align-content: start !important;
            }

            .student-card {
                width: 100mm !important;
                height: 140mm !important;
                box-shadow: none !important;
                border: 1px dashed #9ca3af !important; /* Clear cutline reference */
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                margin: 0 !important;
            }

            /* Force page break after every 4th card to ensure exactly 4 per A4 page */
            .student-card:nth-child(4n) {
                page-break-after: always !important;
                break-after: page !important;
            }
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="w-16 h-16 border-4 border-[#322a83] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="kh-moul text-[#322a83] text-lg animate-pulse" id="loading-text">កំពុងរៀបចំទិន្នន័យកាតសិស្ស...</p>
    </div>

    <!-- Navigation Bar (No Print) -->
    <nav class="bg-indigo-900 text-white p-4 shadow-lg sticky top-0 z-50 no-print">
        <div class="container mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <a href="index.html" class="hover:text-indigo-200 transition-colors p-2 -ml-2 rounded-full hover:bg-white/10">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <h1 class="kh-moul text-lg">បោះពុម្ពកាតសិស្ស</h1>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 sm:gap-4 w-full sm:w-auto text-sm">
                <!-- Background Selection -->
                <div class="bg-white/10 flex items-center rounded overflow-hidden shadow-inner px-3 py-2 gap-2">
                    <i data-lucide="image" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">ផ្ទៃខាងក្រោយ:</span>
                    <select onchange="changeBackground(event)" class="bg-transparent text-white border-none outline-none cursor-pointer p-0 font-bold focus:ring-0 [&>option]:text-gray-900">
                        <option value="1_id-student.jpg">ទម្រង់ទី ១</option>
                        <option value="2_id-student.jpg" selected>ទម្រង់ទី ២</option>
                    </select>
                </div>

                <!-- Upload Signature & Zoom Controls -->
                <div class="bg-white/10 flex items-center rounded overflow-hidden shadow-inner">
                    <label class="cursor-pointer hover:bg-white/20 px-3 py-2 flex items-center gap-2 transition-colors border-r border-white/20">
                        <i data-lucide="pen-tool" class="w-4 h-4"></i> <span class="hidden sm:inline">ហត្ថលេខា</span>
                        <input type="file" accept="image/*" class="hidden" onchange="uploadSignature(event)">
                    </label>
                    <button onclick="zoomSignature(0.1)" class="hover:bg-white/20 px-3 py-2 transition-colors flex items-center" title="ពង្រីក (Zoom In)">
                        <i data-lucide="zoom-in" class="w-4 h-4"></i>
                    </button>
                    <button onclick="zoomSignature(-0.1)" class="hover:bg-white/20 px-3 py-2 transition-colors flex items-center" title="បង្រួម (Zoom Out)">
                        <i data-lucide="zoom-out" class="w-4 h-4"></i>
                    </button>
                </div>

                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded font-bold shadow-md flex items-center gap-2 transition-colors ml-auto text-white">
                    <i data-lucide="printer" class="w-4 h-4"></i> បោះពុម្ព
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container for Cards -->
    <div class="container mx-auto max-w-5xl my-8 print:my-0 print:max-w-none">
        <!-- Empty State -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-16 text-gray-500 bg-white rounded-xl shadow-sm no-print">
            <i data-lucide="inbox" class="w-16 h-16 mb-4 opacity-50"></i>
            <p class="text-lg font-bold">មិនមានទិន្នន័យសិស្សសម្រាប់បោះពុម្ពទេ</p>
        </div>

        <!-- Cards Grid -->
        <div id="cards-container">
            <!-- Cards will be injected here via JavaScript -->
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBU50HJrekgHWwwyLq5CTRwhjHkGJAAAfs",
            authDomain: "classroom-management-82382.firebaseapp.com",
            projectId: "classroom-management-82382",
            storageBucket: "classroom-management-82382.firebasestorage.app",
            messagingSenderId: "146641865620",
            appId: "1:146641865620:web:ce693b7b064afd5d1bdd81",
            measurementId: "G-PX867PB723"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const PTEC_APP_ID = "ptec-app";
        
        let currentUser = null;
        let profileData = {};
        let studentsData = [];

        // State variables
        let signatureImageSrc = '';
        let signatureScale = 1;
        let currentBgImage = "2_id-student.jpg"; // Default background

        const loadingOverlay = document.getElementById('loadingOverlay');

        lucide.createIcons();

        // Check Auth
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }
            } catch (error) { console.error("Auth error:", error); }
        };

        initAuth().then(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    loadAllData();
                } else {
                    alert('សូមចូលគណនីជាមុនសិន!');
                }
            });
        });

        // Load Both Profile and Students
        async function loadAllData() {
            try {
                // 1. Fetch Profile (School Info)
                const profileRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'profile', 'data');
                const profileSnap = await getDoc(profileRef);
                if (profileSnap.exists()) {
                    profileData = profileSnap.data();
                }

                // 2. Fetch Students
                const studentsRef = collection(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'students');
                const studentsSnap = await getDocs(studentsRef);
                studentsData = [];
                studentsSnap.forEach((doc) => {
                    studentsData.push(doc.data());
                });

                // Sort students alphabetically or by ID
                studentsData.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

                renderCards();
            } catch (error) {
                console.error("Error loading data:", error);
                alert("មានបញ្ហាក្នុងការទាញយកទិន្នន័យ។");
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        // --- Helper Functions ---
        const khNumbers = ['០','១','២','៣','៤','៥','៦','៧','៨','៩'];
        function toKhmerNum(str) {
            if (!str) return '';
            return str.toString().split('').map(char => {
                if (char >= '0' && char <= '9') return khNumbers[parseInt(char)];
                return char;
            }).join('');
        }

        function formatKhmerDate(dateStr) {
            if (!dateStr || dateStr === '-') return '-';
            const parts = dateStr.split('-');
            if(parts.length !== 3) return toKhmerNum(dateStr);
            const year = parts[0];
            const month = parseInt(parts[1], 10);
            const day = parseInt(parts[2], 10);
            const khMonths = ["មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ"];
            return `${toKhmerNum(day)} ${khMonths[month-1]} ${toKhmerNum(year)}`;
        }

        function formatLocationShort(s) {
            const clean = (str, regex) => str ? str.replace(regex, '').trim() : '';
            let v = clean(s.village, /^(ភូមិទី|ភូមិ)\s*/);
            let c = clean(s.commune, /^(ឃុំ\/សង្កាត់|សង្កាត់|ឃុំ)\s*/);
            let d = clean(s.district, /^(ស្រុក\/ខណ្ឌ|ក្រុង\/ស្រុក\/ខណ្ឌ|ខណ្ឌ|ស្រុក|ក្រុង)\s*/);
            let p = clean(s.province, /^(ខេត្ត\/ក្រុង|រាជធានី\/ខេត្ត|រាជធានី|ខេត្ត)\s*/);
            
            let parts = [];
            if(v) parts.push(`${v}`);
            if(c) parts.push(`${c}`);
            if(d) parts.push(`${d}`);
            if(p) parts.push(`${p}`);
            return parts.join(' ') || '-';
        }

        function getCurrentKhmerDate() {
            const d = new Date();
            const year = d.getFullYear();
            const month = d.getMonth() + 1;
            const day = d.getDate();
            const khMonths = ["មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ"];
            return `ថ្ងៃទី${toKhmerNum(day)} ខែ${khMonths[month-1]} ឆ្នាំ${toKhmerNum(year)}`;
        }

        // Render Cards HTML
        function renderCards() {
            const container = document.getElementById('cards-container');
            const emptyState = document.getElementById('emptyState');

            if (studentsData.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }

            container.innerHTML = '';

            studentsData.forEach(student => {
                // Formatting data
                const managementUnit1 = profileData.management_unit_1 || ''; 
                const schoolName = profileData.school_name_admin || '';
                const academicYear = toKhmerNum(profileData.academic_year || '២០២៤-២០២៥');
                const className = profileData.class_name || '១ «ក»';
                const director = profileData.manager_role || 'នាយកសាលា';
                const provinceDate = profileData.province_for_date || 'ភ្នំពេញ';
                
                const dob = formatKhmerDate(student.dob);
                const pob = formatLocationShort(student);
                const father = student.father || '-';
                const mother = student.mother || '-';
                
                const photoHtml = student.photo 
                    ? `<img src="${student.photo}" class="w-full h-full object-cover">` 
                    : `<span class="text-[#0000ff] text-[10px] font-sans font-bold tracking-widest">3 X 4</span>`;

                const cardHTML = `
                    <div class="student-card">
                        <!-- Background Frame -->
                        <img src="${currentBgImage}" class="card-bg template-bg" onerror="this.style.display='none'">
                            <!-- Management Unit 1 -->
                            <div class="absolute w-[70%] left-[22%] text-center text-[#ff0000] kh-moul text-[11px] top-[16%] leading-tight px-2 flex items-center justify-center h-[5%]">
                                ${managementUnit1}
                            </div>

                            <!-- Card Title -->
                            <div class="absolute w-full text-center text-[#0000ff] kh-moul text-[18px] top-[24%]">
                                ប័ណ្ណសម្គាល់ខ្លួនសិស្ស
                            </div>

                            <!-- Academic Year -->
                            <div class="absolute w-full text-center text-black kh-moul text-[14px] top-[30%]">
                                ឆ្នាំសិក្សា ${academicYear}
                            </div>
                            
                            <!-- Grade -->
                            <div class="absolute w-full text-center text-[#0000ff] kh-moul text-[15px] top-[34%]">
                                ${className}
                            </div>

                            <!-- Detail rows -->
                            <div class="absolute w-[88%] left-[6%] top-[40%] text-[13px] flex flex-col gap-[7px]">
                                
                                <!-- Name & Gender -->
                                <div class="flex items-end">
                                    <span class="text-black whitespace-nowrap mb-[1px]">គោត្តនាម និងនាម:</span>
                                    <span class="text-[#ff0000] kh-moul text-[14px] ml-2 flex-grow text-center">${student.name || '-'}</span>
                                    <span class="text-black whitespace-nowrap mb-[1px] ml-2">ភេទ</span>
                                    <span class="text-[#ff0000] kh-moul text-[14px] ml-2 w-[40px] text-center">${student.gender || '-'}</span>
                                </div>

                                <!-- DOB -->
                                <div class="flex items-end">
                                    <span class="text-black whitespace-nowrap mb-[1px]">ថ្ងៃខែឆ្នាំកំណើត :</span>
                                    <span class="text-[#ff0000] kh-moul text-[14px] ml-4 flex-grow">${dob}</span>
                                </div>

                                <!-- POB -->
                                <div class="flex items-start mt-[2px]">
                                    <span class="text-black whitespace-nowrap">ទីកន្លែងកំណើត :</span>
                                    <span class="text-[#ff0000] text-[14px] leading-[1.4] line-clamp-2 ml-2 flex-grow">${pob}</span>
                                </div>

                                <!-- Parents -->
                                <div class="flex items-end mt-[2px]">
                                    <span class="text-black whitespace-nowrap mb-[1px]">ឈ្មោះឪពុក</span>
                                    <span class="text-[#ff0000] kh-moul text-[13px] ml-2 w-[30%] truncate text-center">${father}</span>
                                    <span class="text-black whitespace-nowrap mb-[1px] ml-2">ឈ្មោះម្តាយ</span>
                                    <span class="text-[#ff0000] kh-moul text-[13px] ml-2 flex-grow truncate text-center">${mother}</span>
                                </div>
                            </div>

                            <!-- School Name -->
                            <div class="absolute w-full top-[62%] flex justify-center items-end text-[14px]">
                                <span class="text-black mb-[2px]">ជាសិស្ស</span>
                                <span class="text-[#0000ff] kh-moul text-[14px] ml-3 max-w-[64%] truncate">${schoolName}</span>
                            </div>

                            <!-- Photo Box -->
                            <div class="absolute left-[9%] bottom-[8%] w-[25mm] h-[33mm] border-[1.5px] border-[#0000ff] bg-white flex items-center justify-center overflow-hidden z-20">
                                ${photoHtml}
                            </div>

                            <!-- Dates and Signatures (Right side) -->
                            <div class="absolute right-[4%] bottom-[5%] w-[58%] flex flex-col items-center">
                                <div class="text-black text-[10px] text-center mb-[2px]">
                                    ថ្ងៃពុធ ១៤រោច ខែពិសាខ ឆ្នាំរោង ឆស័ក ព.ស.២៥៦៨
                                </div>
                                <div class="text-black text-[11px] text-center mb-1">
                                    ${provinceDate} ថ្ងៃទី១១ ខែមីនា ឆ្នាំ២០២៦
                                </div>
                                <div class="text-black kh-moul text-[14px] text-center z-20 mt-1">
                                    ${director}
                                </div>
                                <!-- Signature Layer -->
                                <div class="h-[15mm] w-full flex items-center justify-center mt-1 z-10 pointer-events-none relative">
                                    <img src="${signatureImageSrc}" class="director-signature object-contain origin-center transition-transform duration-200 absolute top-[-15px] ${signatureImageSrc ? '' : 'hidden'}" style="transform: scale(${signatureScale}); max-width: 100%; max-height: 100%;">
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // --- Interaction Handlers ---
        
        // Handle Background Change
        window.changeBackground = function(event) {
            currentBgImage = event.target.value;
            renderCards(); // Re-render to show the new background
        };

        // --- Signature Upload & Zoom Handlers ---
        window.uploadSignature = function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    signatureImageSrc = e.target.result;
                    renderCards(); // Re-render to show the new signature on all cards
                };
                reader.readAsDataURL(file);
            }
        };

        window.zoomSignature = function(delta) {
            signatureScale += delta;
            if (signatureScale < 0.2) signatureScale = 0.2; // Min limit
            if (signatureScale > 5.0) signatureScale = 5.0; // Max limit
            
            const signs = document.querySelectorAll('.director-signature');
            signs.forEach(sign => {
                sign.style.transform = `scale(${signatureScale})`;
            });
        };
    </script>
</body>
</html>
