    <style>
        :root { --primary: #0054a6; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f0f4f8; min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden; }
        .kh-moul { font-family: 'Moul', cursive; }
        
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 10% 20%, #e0e7ff 0%, transparent 40%), radial-gradient(circle at 90% 80%, #dcfce7 0%, transparent 40%), radial-gradient(circle at 50% 50%, #fef3c7 0%, transparent 50%); animation: moveBg 20s infinite alternate ease-in-out; }
        @keyframes moveBg { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .card-3d { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 2rem; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
        .card-3d:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.95); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); }
        
        .app-icon-container { width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 1.25rem; }

        /* Glowing Border Animation Styles */
        .glowing-wrapper {
            position: relative;
            padding: 3px; 
            border-radius: 1.3rem; 
            overflow: hidden;
            background: rgba(255,255,255,0.1); 
        }

        .glowing-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg at 50% 50%,
                transparent 0%,
                #ff2d75 25%, 
                transparent 25%,
                transparent 50%,
                #4facfe 75%, 
                transparent 75%,
                transparent 100%
            );
            animation: rotateGlow 4s linear infinite;
            z-index: 0;
        }

        .glowing-wrapper::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg at 50% 50%,
                transparent 0%,
                #ff2d75 25%,
                transparent 25%,
                transparent 50%,
                #4facfe 75%,
                transparent 75%,
                transparent 100%
            );
            animation: rotateGlow 4s linear infinite;
            z-index: 0;
            filter: blur(15px);
            opacity: 0.5;
        }

        .glowing-inner {
            position: relative;
            background-color: white;
            border-radius: 1.15rem; 
            z-index: 10;
            width: 100%;
            height: 100%;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .auth-tab.active {
            border-bottom: 2px solid #0054a6;
            color: #0054a6;
            font-weight: bold;
        }
    </style>
</head>

            } else {
                authError.classList.remove('bg-green-50', 'border-green-200', 'text-green-700');
                authError.classList.add('bg-red-50', 'border-red-200', 'text-red-600');
            }
            authError.classList.remove('hidden');
        };
        const hideError = () => authError.classList.add('hidden');

        // --- Layout Toggles ---
        tabLogin.addEventListener('click', () => {
            isLoginMode = true;
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            authTitle.textContent = "ចូលគណនីប្រព័ន្ធ";
            btnText.textContent = "ចូលគណនី";
            forgotPasswordBtn.classList.remove('hidden'); // Show link when in Login Mode
            hideError();
        });

        tabRegister.addEventListener('click', () => {
            isLoginMode = false;
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            authTitle.textContent = "បង្កើតគណនីថ្មី";
            btnText.textContent = "ចុះឈ្មោះ (Register)";
            forgotPasswordBtn.classList.add('hidden'); // Hide link when in Register Mode
            hideError();
        });

        // Show Forgot Password View
        forgotPasswordBtn.addEventListener('click', () => {
            emailAuthForm.classList.add('hidden');
            authTabs.classList.add('hidden');
            socialDivider.classList.add('hidden');
            socialButtons.classList.add('hidden');
            authTitle.textContent = "កំណត់ពាក្យសម្ងាត់ថ្មី";
            
            // pre-fill email if they already typed it
            if(emailInput.value) resetEmailInput.value = emailInput.value;
            
            forgotPasswordContainer.classList.remove('hidden');
            hideError();
        });

        // Back to Login View
        backToLoginBtn.addEventListener('click', () => {
            forgotPasswordContainer.classList.add('hidden');
            emailAuthForm.classList.remove('hidden');
            authTabs.classList.remove('hidden');
            socialDivider.classList.remove('hidden');
            socialButtons.classList.remove('hidden');
            authTitle.textContent = isLoginMode ? "ចូលគណនីប្រព័ន្ធ" : "បង្កើតគណនីថ្មី";
            hideError();
        });

        // --- Authentication Logic ---

        // Track Authentication State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.style.display = 'none';
                mainContent.classList.remove('hidden');
                setTimeout(() => mainContent.classList.remove('opacity-0'), 50); 
                
                currentTeacherUid = user.uid;
                
                if (copyCodeBtn) {
                    copyCodeBtn.classList.remove('hidden');
                    copyCodeBtn.classList.add('flex');
                }

            } else {
                mainContent.classList.add('hidden');
                mainContent.classList.add('opacity-0');
                authSection.style.display = 'flex';
                authSection.classList.remove('opacity-0');
                currentTeacherUid = '';
                
                if (copyCodeBtn) {
                    copyCodeBtn.classList.add('hidden');
                    copyCodeBtn.classList.remove('flex');
                }
            }
        });

        // 1. Email / Password (Login & Register)
        emailAuthForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = document.getElementById('password').value;

            btnText.textContent = 'កំពុងដំណើរការ...';
            btnLoader.classList.remove('hidden');
            hideError();
            mainAuthBtn.disabled = true;

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                if (error.code === 'auth/email-already-in-use') {
                    showError('អុីមែលនេះមានគេប្រើរួចហើយ។ សូមចូលគណនី!');
                } else if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    showError('អុីមែល ឬពាក្យសម្ងាត់មិនត្រឹមត្រូវឡើយ។');
                } else if (error.code === 'auth/weak-password') {
                    showError('ពាក្យសម្ងាត់ត្រូវមានយ៉ាងហោចណាស់ ៦ តួ។');
                } else {
                    showError('មានបញ្ហាក្នុងការភ្ជាប់។ សូមព្យាយាមម្តងទៀត!');
                }
            } finally {
                btnText.textContent = isLoginMode ? 'ចូលគណនី' : 'ចុះឈ្មោះ (Register)';
                btnLoader.classList.add('hidden');
                mainAuthBtn.disabled = false;
            }
        });

        // 1.5 Submit Forgot Password Form
        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = resetEmailInput.value.trim();
            hideError();
            
            resetBtnText.textContent = 'កំពុងផ្ញើ...';
            resetBtnLoader.classList.remove('hidden');
            sendResetBtn.disabled = true;

            try {
                await sendPasswordResetEmail(auth, email);
                showError(`✅ តំណភ្ជាប់ត្រូវបានផ្ញើទៅកាន់ ${email} ហើយ។ សូមពិនិត្យមើលប្រអប់សារ (Inbox) ព្រមទាំងថត Spam/Junk របស់អ្នក។`, true);
                resetEmailInput.value = ''; // clear input
            } catch (error) {
                console.error("Password Reset Error:", error);
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-email') {
                    showError('មិនមានគណនីដែលប្រើប្រាស់អុីមែលនេះទេ ឬអុីមែលមិនត្រឹមត្រូវ។');
                } else if (error.code === 'auth/too-many-requests') {
                    showError('អ្នកបានស្នើសុំច្រើនដងពេកហើយ។ សូមរង់ចាំមួយសន្ទុះសិនរួចព្យាយាមម្តងទៀត។');
                } else {
                    // Show exact error from Firebase to help debug setup issues
                    showError('បរាជ័យក្នុងការផ្ញើ៖ ' + error.message);
                }
            } finally {
                resetBtnText.textContent = 'ផ្ញើតំណភ្ជាប់ (Send Link)';
                resetBtnLoader.classList.add('hidden');
                sendResetBtn.disabled = false;
            }
        });

        // 2. Google Login
        googleLoginBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            hideError();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Google Auth Error:", error);
                showError('ការចូលដោយប្រើ Google មិនជោគជ័យ។');
            }
        });

        // Handle Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            if(confirm('តើអ្នកពិតជាចង់ចាកចេញពីប្រព័ន្ធមែនទេ?')) {
                signOut(auth).catch((error) => console.error("Sign Out Error", error));
            }
        });

        // Utilities
        window.copyTeacherId = function() {
            if (!currentTeacherUid) return;
            copyFallback(currentTeacherUid, "លេខកូដ");
        };

        function copyFallback(text, label = "លេខកូដ") {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert(`✅ បានចម្លង${label}៖ ` + text);
            } catch (err) {
                alert('បរាជ័យក្នុងការ Copy។ សូម Copy លេខកូដដោយផ្ទាល់។');
            }
            document.body.removeChild(textArea);
        }

        // PWA Install Logic
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        const mobileInstallBtn = document.getElementById('mobile-install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if(installBtn) installBtn.classList.remove('hidden');
            if(mobileInstallBtn) mobileInstallBtn.classList.remove('hidden');
        });

        const handleInstallClick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                if(installBtn) installBtn.classList.add('hidden');
                if(mobileInstallBtn) mobileInstallBtn.classList.add('hidden');
            }
        };

        if(installBtn) installBtn.addEventListener('click', handleInstallClick);
        if(mobileInstallBtn) mobileInstallBtn.addEventListener('click', handleInstallClick);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .catch(err => console.log('បរាជ័យក្នុងការដំណើរការ Service Worker:', err));
            });
        }
    </script>
</body>
</html>
