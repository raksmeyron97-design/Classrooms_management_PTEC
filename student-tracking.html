<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTEC - បង្ហាញសៀវភៅតាមដាន (A5)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/gh/ThyrithSor/momentkh@3.0.3/momentkh.js"></script>
    
    <style>
        :root { --primary: #0054a6; --secondary: #3b82f6; }
        
        body { font-family: 'Khmer OS Battambang', 'Battambang', sans-serif; background: #f0f4f8; min-height: 100vh; margin: 0; color: #1e293b; }
        .kh-moul { font-family: 'Khmer OS Muol Light', 'Moul', cursive; }
        .font-battambang { font-family: 'Khmer OS Battambang', 'Battambang', sans-serif; }
        
        /* Form Control */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .input-field {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            outline: none;
            background: #f8fafc;
            font-family: 'Khmer OS Battambang', 'Battambang', sans-serif;
            transition: all 0.2s;
            font-weight: 700;
        }
        .input-field:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(0, 84, 166, 0.1); }

        /* Print Container & A5 Styling */
        .print-container {
            background: white;
            width: 14.8cm;
            min-height: 21cm;
            margin: 2rem auto;
            padding: 1.5cm 1cm;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* ------------------------- */
        /* កែសម្រួល Table សម្រាប់ Print */
        /* ------------------------- */
        .report-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 5px; line-height: 1.2; }
        .report-table th, .report-table td { border: 1px solid #000; padding: 1px 3px; text-align: center; vertical-align: middle; }
        .report-table th { background-color: #addcf3 !important; font-family: 'Khmer OS Muol Light', 'Moul', cursive; font-size: 10px; font-weight: normal; }
        
        .bg-summary { background-color: #ffffff !important; }
        
        @media print {
            @page { size: A5 portrait; margin: 0; }
            body { background: white !important; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            
            #printAreaWrapper { display: block !important; width: 100%; }
            #printContainerWrapper { display: block !important; width: 100%; gap: 0 !important; }

            .print-container { 
                display: block !important; 
                width: 100%;
                height: 100%;
                box-shadow: none !important;
                /* បន្ថយ Padding សងខាងពេល Print */
                padding: 0.8cm 0.8cm !important;
                margin: 0 !important;
                page-break-after: always;
            }
            .print-container:last-child {
                page-break-after: auto;
            }
            .report-table th { background-color: #c0e8ee !important; -webkit-print-color-adjust: exact; color-adjust: exact; }
            /* បង្រួម Font បន្តិចពេល Print */
            html { font-size: 90%; }
        }

        .preview-mode { background: #94a3b8; padding-top: 2rem; padding-bottom: 2rem; }

        /* Custom Scrollbar for Student List */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

    <!-- Selection Screen -->
    <div id="selectionScreen" class="min-h-screen flex flex-col pt-8 px-4 no-print relative pb-10">
        <div class="max-w-5xl mx-auto w-full">
            
            <div class="flex justify-between items-center mb-6">
                <a href="index.html" class="inline-flex items-center gap-2 text-[#0054a6] hover:text-blue-800 font-bold transition">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i> ត្រឡប់ទៅទំព័រដើម
                </a>
                
                <div class="flex gap-2 flex-wrap justify-end">
                    <!-- Print All Button -->
                    <button onclick="window.printAllStudents()" class="px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 text-sm bg-green-600 text-white border border-green-600 shadow-[0_4px_6px_-1px_rgba(34,197,94,0.5)] hover:bg-green-700 transition-all">
                        <i data-lucide="printer" class="w-4 h-4"></i> បោះពុម្ពសិស្សទាំងអស់
                    </button>
                    <!-- Settings Button -->
                    <button onclick="window.openSignatureModal()" class="px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 text-sm bg-[#3b82f6] text-white border border-[#3b82f6] shadow-[0_4px_6px_-1px_rgba(59,130,246,0.5)] hover:bg-blue-600 transition-all">
                        <i data-lucide="pen-tool" class="w-4 h-4"></i> កំណត់ហត្ថលេខា
                    </button>
                </div>
            </div>

            <div class="glass-card p-6 md:p-8 text-center">
                <div class="flex justify-center mb-4">
                    <div class="p-4 bg-yellow-50 rounded-full text-yellow-600 border border-yellow-100">
                        <i data-lucide="file-text" class="w-8 h-8"></i>
                    </div>
                </div>
                <h1 class="kh-moul text-xl md:text-2xl text-[#0054a6] mb-8">បង្ហាញលទ្ធផលសិក្សាតាមសិស្ស (A5)</h1>

                <!-- Type Selection Pill -->
                <div class="mb-8 flex justify-center">
                    <div class="inline-flex bg-gray-50 border border-gray-200 p-1.5 rounded-2xl flex-wrap justify-center gap-1 shadow-sm">
                        <button onclick="window.setType('monthly')" id="btnMonthly" class="px-6 py-2 rounded-xl bg-white shadow-sm text-[#0054a6] font-bold transition flex items-center gap-2">
                            <i data-lucide="calendar" class="w-4 h-4"></i> ប្រចាំខែ
                        </button>
                        <button onclick="window.setType('semester')" id="btnSemester" class="px-6 py-2 rounded-xl text-gray-500 font-bold hover:bg-gray-100 transition flex items-center gap-2">
                            <i data-lucide="bookmark" class="w-4 h-4"></i> ប្រចាំឆមាស
                        </button>
                        <button onclick="window.setType('yearly')" id="btnYearly" class="px-6 py-2 rounded-xl text-gray-500 font-bold hover:bg-gray-100 transition flex items-center gap-2">
                            <i data-lucide="award" class="w-4 h-4 text-fuchsia-600"></i> ប្រចាំឆ្នាំ
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left mb-8 max-w-2xl mx-auto">
                    <!-- Year Select -->
                    <div>
                        <label class="block font-bold text-gray-700 mb-2 text-sm ml-1">ឆ្នាំសិក្សា</label>
                        <select id="yearSelect" class="input-field shadow-sm" onchange="window.updateMonthOptions(); window.loadStudents();">
                            <option value="2025-2026" selected>2025-2026</option>
                            <option value="2026-2027">2026-2027</option>
                            <option value="2027-2028">2027-2028</option>
                            <option value="2028-2029">2028-2029</option>
                        </select>
                    </div>

                    <!-- Period Select -->
                    <div id="periodInputGroup">
                        <label class="block font-bold text-gray-700 mb-2 text-sm ml-1" id="periodLabel">ជ្រើសរើសខែ</label>
                        <select id="periodSelect" class="input-field shadow-sm">
                        </select>
                    </div>
                </div>

                <hr class="border-gray-200 mb-6">

                <!-- Student List Section -->
                <div class="text-left">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                        <h2 class="font-bold text-lg text-gray-800 flex items-center gap-2">
                            <i data-lucide="users" class="w-5 h-5 text-blue-500"></i> ជ្រើសរើសសិស្សខាងក្រោម៖
                        </h2>
                        
                        <!-- Search Bar -->
                        <div class="relative w-full md:w-72">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                            <input type="text" id="searchInput" onkeyup="window.filterStudents()" placeholder="ស្វែងរកឈ្មោះ ឬអត្តលេខ..." class="input-field pl-10 text-sm py-2 shadow-sm">
                        </div>
                    </div>

                    <!-- Student Grid -->
                    <div id="studentGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 max-h-[450px] overflow-y-auto custom-scrollbar pr-2 pb-4">
                        <!-- Student Cards will be generated here -->
                        <div class="col-span-full text-center py-10 text-gray-500">
                            <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-2 text-blue-500"></i>
                            កំពុងផ្ទុកទិន្នន័យសិស្ស...
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Global Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[200] hidden items-center justify-center flex-col">
        <div class="bg-white p-8 rounded-2xl shadow-xl flex flex-col items-center border border-gray-100">
            <i data-lucide="loader-2" class="w-12 h-12 text-[#0054a6] animate-spin mb-4"></i>
            <p class="font-bold text-lg text-[#0054a6] kh-moul">កំពុងរៀបចំប័ណ្ណសរសើរ...</p>
            <p class="text-sm text-gray-500 mt-2">សូមរង់ចាំបន្តិច</p>
        </div>
    </div>

    <!-- Print Preview Container -->
    <div id="printAreaWrapper" class="hidden">
        
        <div class="fixed top-4 right-4 flex flex-col gap-3 z-50 no-print">
            <button onclick="window.print()" class="bg-blue-600 text-white p-3 rounded-full shadow-xl hover:bg-blue-700 hover:scale-105 transition" title="បោះពុម្ភ">
                <i data-lucide="printer" class="w-6 h-6"></i>
            </button>
            <button onclick="window.closePreview()" class="bg-slate-600 text-white p-3 rounded-full shadow-xl hover:bg-slate-700 hover:scale-105 transition" title="បិទ">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div id="printContainerWrapper" class="w-full flex flex-col items-center pb-10 gap-8">
            <!-- Dynamic .print-container blocks will be injected here -->
        </div>
    </div>

    <!-- Signature Settings Modal -->
    <div id="signatureModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4 no-print">
        <div class="bg-white rounded-2xl w-full max-w-4xl shadow-2xl flex flex-col overflow-hidden">
            <!-- Modal Header -->
            <div class="flex items-center justify-between p-5 border-b border-indigo-100 bg-indigo-50/80">
                <h3 class="flex items-center gap-2 font-bold text-indigo-900 kh-moul text-[15px]">
                    <i data-lucide="pen-tool" class="w-5 h-5"></i> កំណត់អ្នកចុះហត្ថលេខាសម្រាប់ការបោះពុម្ព
                </h3>
                <button onclick="window.closeSignatureModal()" class="text-slate-400 hover:text-red-500 bg-white p-1 rounded-full shadow-sm transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50/50">
                <!-- Manager Card -->
                <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex flex-col">
                    <label class="block font-bold text-slate-700 text-sm mb-2">ឈ្មោះនាយកសាលា</label>
                    <input type="text" id="sig_manager_name" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none mb-5" placeholder="វាយបញ្ចូលឈ្មោះ...">
                    
                    <label class="block font-bold text-slate-700 text-sm mb-2">រូបភាពហត្ថលេខា / ត្រា (បើមាន)</label>
                    <div class="flex items-center justify-between gap-3 mb-4">
                        <div class="flex items-center gap-3">
                            <label class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg font-bold text-xs cursor-pointer hover:bg-indigo-100 transition shadow-sm border border-indigo-100">
                                ជ្រើសរើសឯកសារ
                                <input type="file" id="sig_manager_file" class="hidden" accept="image/*" onchange="window.handleFileUpload(event, 'manager')">
                            </label>
                            <span class="text-xs text-slate-400" id="sig_manager_filename">មិនមានឯកសារ...</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 mt-auto">
                        <div class="border border-slate-200 rounded-xl h-28 flex-1 flex items-center justify-between p-2 bg-slate-50 overflow-hidden">
                            <button type="button" onclick="window.zoomSignature('manager', -0.1)" class="p-2 text-slate-500 hover:bg-slate-200 rounded-lg transition shrink-0 z-10 bg-white shadow-sm border border-slate-100" title="បង្រួម">
                                <i data-lucide="zoom-out" class="w-5 h-5"></i>
                            </button>
                            <div class="h-full flex-1 flex items-center justify-center overflow-visible relative px-2">
                                <img id="sig_manager_preview" src="" class="max-h-full max-w-full object-contain hidden transition-transform pointer-events-none" style="transform-origin: center; transform: scale(1);">
                                <span id="sig_manager_placeholder" class="text-slate-400 text-xs border border-dashed border-slate-300 px-6 py-2 rounded-lg">គ្មាន</span>
                            </div>
                            <button type="button" onclick="window.zoomSignature('manager', 0.1)" class="p-2 text-slate-500 hover:bg-slate-200 rounded-lg transition shrink-0 z-10 bg-white shadow-sm border border-slate-100" title="ពង្រីក">
                                <i data-lucide="zoom-in" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <button type="button" onclick="window.removeSignature('manager')" class="p-3 text-red-500 hover:bg-red-50 bg-white rounded-xl border border-red-100 transition shadow-sm shrink-0" title="លុបរូបភាពចេញ">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Teacher Card -->
                <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex flex-col">
                    <label class="block font-bold text-slate-700 text-sm mb-2">ឈ្មោះគ្រូបន្ទុកថ្នាក់</label>
                    <input type="text" id="sig_teacher_name" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none mb-5" placeholder="វាយបញ្ចូលឈ្មោះ...">
                    
                    <label class="block font-bold text-slate-700 text-sm mb-2">រូបភាពហត្ថលេខា (បើមាន)</label>
                    <div class="flex items-center justify-between gap-3 mb-4">
                        <div class="flex items-center gap-3">
                            <label class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg font-bold text-xs cursor-pointer hover:bg-indigo-100 transition shadow-sm border border-indigo-100">
                                ជ្រើសរើសឯកសារ
                                <input type="file" id="sig_teacher_file" class="hidden" accept="image/*" onchange="window.handleFileUpload(event, 'teacher')">
                            </label>
                            <span class="text-xs text-slate-400" id="sig_teacher_filename">មិនមានឯកសារ...</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 mt-auto">
                        <div class="border border-slate-200 rounded-xl h-28 flex-1 flex items-center justify-between p-2 bg-slate-50 overflow-hidden">
                            <button type="button" onclick="window.zoomSignature('teacher', -0.1)" class="p-2 text-slate-500 hover:bg-slate-200 rounded-lg transition shrink-0 z-10 bg-white shadow-sm border border-slate-100" title="បង្រួម">
                                <i data-lucide="zoom-out" class="w-5 h-5"></i>
                            </button>
                            <div class="h-full flex-1 flex items-center justify-center overflow-visible relative px-2">
                                <img id="sig_teacher_preview" src="" class="max-h-full max-w-full object-contain hidden transition-transform pointer-events-none" style="transform-origin: center; transform: scale(1);">
                                <span id="sig_teacher_placeholder" class="text-slate-400 text-xs border border-dashed border-slate-300 px-6 py-2 rounded-lg">គ្មាន</span>
                            </div>
                            <button type="button" onclick="window.zoomSignature('teacher', 0.1)" class="p-2 text-slate-500 hover:bg-slate-200 rounded-lg transition shrink-0 z-10 bg-white shadow-sm border border-slate-100" title="ពង្រីក">
                                <i data-lucide="zoom-in" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <button type="button" onclick="window.removeSignature('teacher')" class="p-3 text-red-500 hover:bg-red-50 bg-white rounded-xl border border-red-100 transition shadow-sm shrink-0" title="លុបរូបភាពចេញ">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="p-4 border-t border-slate-100 flex justify-end gap-3 bg-white">
                <button onclick="window.closeSignatureModal()" class="px-6 py-2.5 rounded-lg font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 text-sm transition">បោះបង់</button>
                <button onclick="window.saveSignatureSettings()" class="px-6 py-2.5 rounded-lg font-bold text-white bg-[#0054a6] hover:bg-blue-800 text-sm shadow-md transition">រក្សាទុក</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Modules and App Logic -->
    <script type="module">

        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- 2. LOCAL CONFIGURATION ---

            { key: 'kh_read', label: 'អាន', max: 10, color: 'text-purple-600' },
            { key: 'kh_write', label: 'សរសេរ', max: 10, color: 'text-purple-600' },
            { key: 'kh_calligraphy', label: 'អក្សរផ្ចង់', max: 10, color: 'text-purple-600' },
            { key: 'kh_recitation', label: 'មេសូត្រ', max: 10, color: 'text-purple-600' },
            { key: 'kh_essay', label: 'តែងសេចក្តី', max: 10, color: 'text-purple-600' },

            { key: 'math_stat', label: 'ស្ថិតិ', max: 10, color: 'text-orange-600' },
            { key: 'sci_phy', label: 'រូបវិទ្យា', max: 10, color: 'text-green-600' },
            { key: 'sci_chem', label: 'គីមីវិទ្យា', max: 10, color: 'text-green-600' },
            { key: 'sci_bio', label: 'ជីវវិទ្យា', max: 10, color: 'text-green-600' },

        window.calculateGrade = function(score, isAvg = false) {
            let avg = isAvg ? score : score; 
            if ((currentType === 'semester' || currentType === 'yearly') && !isAvg) {
                avg = score / 10; 
            }

            if (avg >= 9.0) return 'A';
            if (avg >= 8.0) return 'B';
            if (avg >= 7.0) return 'C';
            if (avg >= 6.0) return 'D';
            if (avg >= 5.0) return 'E';
            return 'F';
        }

        window.getAttendanceStats = function(studentId, period, type) {
            let absent = 0;     
            let permission = 0; 
            
            const monthStrs = {
                'jan': '01', 'feb': '02', 'mar': '03', 'apr': '04',
                'may': '05', 'jun': '06', 'jul': '07', 'aug': '08',
                'sep': '09', 'oct': '10', 'nov': '11', 'dec': '12'
            };
            
            // កំណត់ឆមាសតាមការស្នើសុំ៖ ឆមាស១ (១១ ដល់ ០៥) និង ឆមាស២ (០៦ ដល់ ០៩)
            const sem1AttMonths = ['11', '12', '01', '02', '03', '04', '05'];
            const sem2AttMonths = ['06', '07', '08', '09'];

            Object.keys(attendanceHistory).forEach(dateStr => {
                const parts = dateStr.split('-');
                if (parts.length !== 3) return;
                
                const m = parts[1];
                
                let isMatch = false;
                if (type === 'yearly') {
                    isMatch = true; 
                } else if (type === 'semester') {
                    isMatch = period === 'sem1' ? sem1AttMonths.includes(m) : sem2AttMonths.includes(m);
                } else {
                    isMatch = m === monthStrs[period];
                }
                
                if (isMatch) {
                    const record = attendanceHistory[dateStr][studentId];
                    if (record) {
                        if (record.status === 'A') absent++;       
                        if (record.status === 'L') permission++;   
                    }
                }
            });

            return { absent, permission };
        }

        window.getSubjectRank = function(studentId, year, period, subjectKey) {
            const sData = scoresCache[`${year}_${period}`] || {};
            const scoresList = [];
            for (let sid in sData) {
                let val = sData[sid][subjectKey];
                if (val !== null && val !== undefined && val !== '') {
                    let num = parseFloat(val);
                    if (!isNaN(num)) {
                        scoresList.push({ id: sid, score: num });
                    }
                }
            }
            if (scoresList.length === 0) return '-';

            scoresList.sort((a, b) => b.score - a.score);
            let currentRank = 1;
            for (let i = 0; i < scoresList.length; i++) {
                if (i > 0 && scoresList[i].score < scoresList[i-1].score) {
                    currentRank = i + 1;
                }
                if (String(scoresList[i].id) === String(studentId)) {
                    return currentRank;
                }
            }
            return '-';
        };

        async function getCachedScoresData(year, period) {
            const key = `${year}_${period}`;
            if (scoresCache[key]) return scoresCache[key];
            
            let data = {};
            if (currentUser) {
                try {
                    const ref = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'scores', key);
                    const snap = await getDoc(ref);
                    if (snap.exists()) data = snap.data();
                    else {
                        const oldRef = doc(db, "scores", key);
                        const oldSnap = await getDoc(oldRef);
                        if (oldSnap.exists()) data = oldSnap.data();
                    }
                } catch (e) {
                    console.error("Firebase fetch error", e);
                }
            }
            if (Object.keys(data).length === 0) {
                const localData = localStorage.getItem(`scores_${key}`);
                if (localData) data = JSON.parse(localData);
            }
            scoresCache[key] = data;
            return data;
        }

        function computeMonthlyAvg(studentId, year, monthsArray) {
            let sumOfAverages = 0;
            monthsArray.forEach(month => {
                const scoresData = scoresCache[`${year}_${month}`] || {};
                const studentScores = scoresData[studentId];
                if (studentScores) {
                    let mSum = 0;
                    let mCount = 0;
                    monthlySubjects.forEach(col => {
                        if (col.isText) return;
                        const val = studentScores[col.key];
                        if (val !== null && val !== undefined && val !== "") {
                            const numVal = parseFloat(val);
                            if (!isNaN(numVal)) {
                                mSum += numVal;
                                mCount++;
                            }
                        }
                    });
                    if (mCount > 0) {
                        sumOfAverages += (mSum / mCount);
                    }
                }
            });
            return monthsArray.length > 0 ? (sumOfAverages / monthsArray.length) : 0;
        }

        function computeExamAvg(studentId, year, semKey) {
            const scoresData = scoresCache[`${year}_${semKey}`] || {};
            const studentScores = scoresData[studentId];
            let sum = 0;
            let count = 0;
            if (studentScores) {
                semesterSubjects.forEach(col => {
                    if (col.isText) return;
                    const val = studentScores[col.key];
                    if (val !== null && val !== undefined && val !== "") {
                        const numVal = parseFloat(val);
                        if (!isNaN(numVal)) {
                            sum += numVal;
                            count++;
                        }
                    }
                });
            }
            return {
                total: sum,
                count: count,
                avg: count > 0 ? (sum / count) : 0
            };
        }

        function computeSemAvg(studentId, year, semKey) {
            const months = semKey === 'sem1' ? sem1Months : sem2Months;
            const exam = computeExamAvg(studentId, year, semKey);
            const monthlyAvg = computeMonthlyAvg(studentId, year, months);
            
            let semAvg = (exam.avg + monthlyAvg) / 2;
            if (exam.count === 0 && monthlyAvg === 0) semAvg = 0;
            
            return semAvg;
        }

        function getRank(studentId, averagesArray) {
            const sorted = [...averagesArray].sort((a, b) => b.avg - a.avg);
            let currentRank = 1;
            for (let i = 0; i < sorted.length; i++) {
                if (i > 0 && sorted[i].avg < sorted[i-1].avg) {
                    currentRank = i + 1;
                }
                if (String(sorted[i].id) === String(studentId)) {
                    return currentRank;
                }
            }
            return '-';
        }

                                <td class="border border-black text-blue-700 text-center">${sem2Avg > 0 ? window.formatNum(sem2Avg) : ''}</td>
                                <td class="border border-black text-red-600 text-center">${sem2Avg > 0 ? sem2FinalRank : ''}</td>
                                <td class="border border-black text-blue-700 text-center">${sem2Avg > 0 ? sem2FinalGrade : ''}</td>
                                <td class="border border-black text-blue-700 text-center">${attSem2.permission > 0 ? attSem2.permission : '0'}</td>
                                <td class="border border-black text-blue-700 text-center">${attSem2.absent > 0 ? attSem2.absent : '0'}</td>
                                <td class="border border-black text-blue-700 text-center">${s2Total > 0 ? s2Total : '0'}</td>
                            </tr>
                            <tr class="h-[24px] font-bold">
                                <td class="border border-black text-center" style="color: #00a651;">ប្រចាំឆ្នាំ</td>
                                <td class="border border-black text-blue-700 text-center">${studentAvg > 0 ? window.formatNum(studentAvg) : ''}</td>
                                <td class="border border-black text-red-600 text-center">${studentAvg > 0 ? yearlyRank : ''}</td>
                                <td class="border border-black text-blue-700 text-center">${studentAvg > 0 ? promotionText : ''}</td>
                                <td class="border border-black text-blue-700 text-center">${attYear.permission > 0 ? attYear.permission : '0'}</td>
                                <td class="border border-black text-blue-700 text-center">${attYear.absent > 0 ? attYear.absent : '0'}</td>
                                <td class="border border-black text-blue-700 text-center">${yTotal > 0 ? yTotal : '0'}</td>
                            </tr>
                        `;
                    } else if (currentType === 'semester') {
                        let scoredRows = displayRows.filter(r => !r.isText);
                        let textRows = displayRows.filter(r => r.isText);

                        const monthsForSem = period === 'sem1' ? sem1Months : sem2Months;
                        const examStats = computeExamAvg(student.id, year, period);
                        const mAvg = computeMonthlyAvg(student.id, year, monthsForSem);

                        if (scoredRows.length > 0) {
                            scoredRows.forEach((item, index) => {
                                let sRank = window.getSubjectRank(student.id, year, period, item.key);
                                let grade = window.calculateGrade(item.score, true); 
                                
                                tbodyHtml += `<tr>`;
                                if (index === 0) {
                                    tbodyHtml += `<td rowspan="${scoredRows.length}" class="border border-black font-bold kh-moul" style="writing-mode: vertical-rl; transform: rotate(180deg);">ពិន្ទុប្រចាំឆមាស</td>`;
                                }
                                tbodyHtml += `
                                    <td class="text-left font-bold px-3 border border-black ${item.color || 'text-blue-800'}">${item.label}</td>
                                    <td class="border border-black">${window.formatNum(item.score)}</td>
                                    <td class="border border-black text-red-600 font-bold">${sRank}</td>
                                    ${getSemesterGradeCell(grade)}
                                    <td class="border border-black"></td>
                                </tr>`;
                            });
                        }

                        if (displayRows.length === 0) {
                            tbodyHtml += `
                                <tr>
                                    <td colspan="6" class="text-center italic text-gray-500 border border-black">មិនមានទិន្នន័យពិន្ទុទេ</td>
                                </tr>
                            `;
                        } else {
                            tbodyHtml += `
                                <tr class="font-bold text-green-700">
                                    <td rowspan="4" class="border border-black kh-moul" style="writing-mode: vertical-rl; transform: rotate(180deg); color: #000;">លទ្ធផលប្រចាំឆមាស</td>
                                    <td class="text-left px-3 border border-black">ពិន្ទុសរុប</td>
                                    <td colspan="4" class="border border-black text-center text-black">${window.formatNum(totalScore)}</td>
                                </tr>
                                <tr class="font-bold text-green-700">
                                    <td class="text-left px-3 border border-black">មធ្យមភាគប្រឡងឆមាស</td>
                                    <td colspan="4" class="border border-black text-center text-black">${window.formatNum(examStats.avg)}</td>
                                </tr>
                                <tr class="font-bold text-green-700">
                                    <td class="text-left px-3 border border-black">មធ្យមភាគប្រចាំខែ</td>
                                    <td colspan="4" class="border border-black text-center text-black">${window.formatNum(mAvg)}</td>
                                </tr>
                                <tr class="font-bold text-green-700">
                                    <td class="text-left px-3 border border-black">មធ្យមភាគប្រចាំឆមាស</td>
                                    <td colspan="4" class="border border-black text-center text-black">${window.formatNum(studentAvg)}</td>
                                </tr>
                            `;
                        }

                        if (textRows.length > 0) {
                            textRows.forEach((item, index) => {
                                tbodyHtml += `<tr class="font-bold">`;
                                if (index === 0) {
                                    tbodyHtml += `<td rowspan="${textRows.length}" class="border border-black kh-moul" style="writing-mode: vertical-rl; transform: rotate(180deg); color: #00a651;">វាយតម្លៃ</td>`;
                                }
                                tbodyHtml += `
                                    <td class="text-left px-3 border border-black text-black">${item.label}</td>
                                    <td colspan="4" class="border border-black text-center text-blue-600">${item.textValue}</td>
                                </tr>`;
                            });
                        }

                        const att = window.getAttendanceStats(student.id, period, currentType);
                        const totalAbs = att.permission + att.absent;

                        tbodyHtml += `
                            <tr class="font-bold text-[11px] bg-[#addcf3]">
                                <td class="border border-black">អវត្តមាន</td>
                                <td class="border border-black">មានច្បាប់</td>
                                <td class="border border-black">អត់ច្បាប់</td>
                                <td class="border border-black">មធ្យមភាគ</td>
                                <td class="border border-black">ចំ.ថ្នាក់</td>
                                <td class="border border-black">និទ្ទេស</td>
                            </tr>
                            <tr class="font-bold text-[11px] bg-white text-black">
                                <td class="border border-black">${totalAbs > 0 ? totalAbs : '0'}</td>
                                <td class="border border-black">${att.permission > 0 ? att.permission : '0'}</td>
                                <td class="border border-black">${att.absent > 0 ? att.absent : '0'}</td>
                                <td class="border border-black">${window.formatNum(studentAvg)}</td>
                                <td class="border border-black text-red-600">${rank}</td>
                                <td class="border border-black ${getGradeColorClass(studentGrade)}">${studentGrade}</td>
                            </tr>
                        `;

                    } else {
                        displayRows.forEach((item, index) => {
                            if (item.isText) {
                                tbodyHtml += `
                                    <tr>
                                        <td class="kh-moul border border-black text-green-600">${window.toKhmerNum(index + 1)}</td>
                                        <td colspan="2" class="text-left font-bold px-2 border border-black ${item.color || 'text-blue-800'}">${item.label}</td>
                                        <td colspan="3" class="text-center font-bold text-blue-600 border border-black">${item.textValue}</td>
                                        <td class="border border-black"></td>
                                    </tr>
                                `;
                            } else {
                                let grade = window.calculateGrade(item.score);
                                let gradeClass = getGradeColorClass(grade);
                                
                                tbodyHtml += `
                                    <tr>
                                        <td class="kh-moul border border-black text-green-600">${window.toKhmerNum(index + 1)}</td>
                                        <td colspan="2" class="text-left font-bold px-2 border border-black ${item.color || 'text-blue-800'}">${item.label}</td>
                                        <td class="border border-black">${item.max}</td>
                                        <td class="border border-black">${window.formatNum(item.score)}</td>
                                        <td class="${gradeClass} border border-black">${grade}</td>
                                        <td class="border border-black"></td>
                                    </tr>
                                `;
                            }
                        });

                        if (displayRows.length === 0) {
                            tbodyHtml += `
                                <tr>
                                    <td colspan="7" class="text-center italic text-gray-500 border border-black">មិនមានទិន្នន័យពិន្ទុទេ</td>
                                </tr>
                            `;
                        }

                        const att = window.getAttendanceStats(student.id, period, currentType);
                        const totalAbs = att.permission + att.absent;

                        tbodyHtml += `
                            <tr class="font-bold bg-summary text-[11px]">
                                <td colspan="2" class="border border-black">អវត្តមាន</td>
                                <td class="border border-black">មានច្បាប់</td>
                                <td class="border border-black">អត់ច្បាប់</td>
                                <td class="border border-black">មធ្យមភាគ</td>
                                <td class="border border-black text-[10px]">ចំ.ថ្នាក់</td>
                                <td class="border border-black">និទ្ទេស</td>
                            </tr>
                            <tr class="text-[11px] font-bold text-black">
                                <td colspan="2" class="border border-black">${totalAbs > 0 ? totalAbs : '0'}</td>
                                <td class="border border-black">${att.permission > 0 ? att.permission : '0'}</td>
                                <td class="border border-black">${att.absent > 0 ? att.absent : '0'}</td>
                                <td class="border border-black">${window.formatNum(studentAvg)}</td>
                                <td class="border border-black text-red-600 font-bold">${rank}</td>
                                <td class="border border-black ${getGradeColorClass(studentGrade)}">${studentGrade}</td>
                            </tr>
                        `;
                    }

                    // --- GENERATE SINGLE CONTAINER FOR THIS STUDENT ---
                    finalAllReportsHtml += `
                    <div class="print-container">
                        <h1 class="kh-moul text-center text-[15px] mb-2 mt-1">${titleHtml}</h1>

                        <div class="flex justify-between text-[11px] font-bold mb-1 px-4">
                            <div class="text-left">
                                <div class="flex items-baseline gap-2 mb-1">
                                    <span class="w-[70px] kh-moul inline-block">អត្តលេខ</span>
                                    <span class="font-bold text-[11px]">${student.id}</span>
                                </div>
                                <div class="flex items-baseline gap-2">
                                    <span class="w-[70px] kh-moul inline-block">ឈ្មោះសិស្ស</span>
                                    <span class="kh-moul font-normal text-[11px]">${student.name}</span>
                                </div>
                            </div>
                            
                            <div class="text-right flex flex-col items-end">
                                <div class="flex items-baseline justify-between min-w-[100px] gap-2 mb-1">
                                    <span class="whitespace-nowrap"></span>
                                    <span class="kh-moul font-normal whitespace-nowrap">${classConfig.className}</span>
                                </div>
                                <div class="flex items-baseline justify-between min-w-[100px] gap-2">
                                    <span class="whitespace-nowrap kh-moul" style="left: 77%; position: absolute;">ភេទ</span>
                                    <span class="kh-moul font-normal" style="left: 84%; position: absolute;" >${(student.gender === 'ប្រុស' || student.gender === 'M' || student.gender === 'm') ? 'ប' : 'ស'}</span>
                                </div>
                            </div>
                        </div>

                        <table class="report-table">
                            <thead>${theadHtml}</thead>
                            <tbody>${tbodyHtml}</tbody>
                        </table>

                        <div class="flex justify-between mt-1 text-[10px] px-2 text-center">
                            <div class="w-[45%] flex flex-col items-center relative">
                                <p class="mb-0 text-[#00a651] font-bold">បានឃើញ និងឯកភាព</p>
                                <p class="kh-moul mb-0 text-[#00a651]">${classConfig.managerRole}</p>
                                <div class="h-10 flex items-center justify-center mb-0 relative z-10 w-full mt-1">
                                    ${savedSigs.managerImage ? `<img src="${savedSigs.managerImage}" class="max-h-full object-contain" style="transform-origin: center; transform: scale(${savedSigs.managerScale || 1});">` : ''}
                                </div>
                                <p class="kh-moul text-[11px] text-[#00a651]" style="margin-left: 2cm;">${savedSigs.managerName || ''}</p>
                            </div>
                            <div class="w-[55%] flex flex-col items-center relative">
                                <div class="mb-0 text-center w-full">
                                    <p class="font-bold text-[#00a651] kh-moul mb-0" style="font-size: 9px;">មូលវិចាររបស់គ្រូប្រចាំថ្នាក់</p>
                                    <p class="text-red-600 mb-0 font-bold" style="font-size: 9px;">${commentText}</p>
                                    <p class="text-red-600 mb-0" style="font-size: 9px;">សូមជូនពរមាតាបិតា ព្រមទាំងកូនៗមានសុខភាពល្អ និងសំណាងល្អ</p>
                                </div>
                                <p class="mb-0 font-battambang text-[10px] text-blue-700 mt-1">${lunarDateStr}</p>
                                <p class="mb-0 font-battambang text-[10px] text-blue-700"><span>${classConfig.location}</span>, <span>${solarDateStr}</span></p>
                                <p class="font-bold text-[#00a651] mb-0 kh-moul">គ្រូប្រចាំថ្នាក់</p>
                                <div class="h-10 flex items-center justify-center mb-0 relative z-10 w-full mt-1" style="padding-left: 2cm;">
                                    ${savedSigs.teacherImage ? `<img src="${savedSigs.teacherImage}" class="max-h-full object-contain" style="transform-origin: center; transform: scale(${savedSigs.teacherScale || 1});">` : ''}
                                </div>
                                <p class="kh-moul text-[11px] text-red-600" style="margin-left: 2cm;">${savedSigs.teacherName || classConfig.teacher}</p>
                            </div>
                        </div>

                        <div class="mt-2 text-[11px] px-2">
                            <p>មតិអាណាព្យាបាល <span class="inline-block border-b border-dotted border-black w-[83%]"></span></p>
                            <p class="mt-3 border-b border-dotted border-black w-full"></p>
                        </div>
                    </div>
                    `;
                } // End of loop over students

                document.getElementById('printContainerWrapper').innerHTML = finalAllReportsHtml;

                document.getElementById('selectionScreen').classList.add('hidden');
                const printWrapper = document.getElementById('printAreaWrapper');
                printWrapper.classList.remove('hidden');
                document.body.classList.add('preview-mode');

            } catch (error) {
                console.error("Error generating report", error);
                alert("មានបញ្ហាក្នុងការទាញយកទិន្នន័យ! សូមព្យាយាមម្តងទៀត។");
            } finally {
                // Hide Loading Overlay
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }
        };

        window.closePreview = function() {
            document.getElementById('selectionScreen').classList.remove('hidden');
            document.getElementById('printAreaWrapper').classList.add('hidden');
            document.body.classList.remove('preview-mode');
        }

    </script>
</body>
</html>
