<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTEC - ព័ត៌មានគណនី</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&family=Moul&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #1e3a8a; /* Deep Blue */
            --primary-light: #2563eb;
            --accent: #4f46e5; /* Indigo */
            --bg-body: #f4f7fb;
        }
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background: var(--bg-body); 
            min-height: 100vh; 
            color: #1e293b;
        }
        .kh-moul { font-family: 'Moul', cursive; font-weight: normal; }
        
        /* Premium Card Style */
        .pro-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }
        
        /* Premium Input Style */
        .pro-input {
            width: 100%;
            padding: 0.65rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #cbd5e1;
            background-color: #f8fafc;
            color: #0f172a;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            outline: none;
        }
        .pro-input:focus {
            background-color: #ffffff;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .pro-input:disabled {
            background-color: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
            border-color: #cbd5e1;
            opacity: 0.8;
        }
        
        .pro-label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.4rem;
        }
        .pro-label span.num {
            color: #94a3b8;
            font-size: 0.75rem;
        }

        /* Top Bar Gradient */
        .top-hero {
            height: 220px;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 0;
        }
        .top-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to bottom, transparent, var(--bg-body));
        }

        /* Avatar Styling */
        .avatar-container {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
            background: white;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 10;
        }
        .camera-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: white;
            color: var(--primary);
            border: 1px solid #e2e8f0;
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
            z-index: 20;
        }
        .camera-btn:hover {
            background: var(--bg-body);
            transform: scale(1.05);
        }

        /* Auto-complete Suggestions List */
        .suggestions-list { 
            position: absolute; width: 100%; background: white; border: 1px solid #cbd5e1; 
            border-radius: 0.5rem; max-height: 220px; overflow-y: auto; z-index: 50; 
            margin-top: 4px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            display: none; 
        }
        .suggestion-item { padding: 10px 14px; cursor: pointer; font-size: 0.85rem; color: #334155; transition: background 0.2s; border-bottom: 1px solid #f1f5f9; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background-color: #eff6ff; color: var(--primary-light); font-weight: 600; }

        /* Loading Overlay */
        #loadingOverlay { position: fixed; inset: 0; background: rgba(244, 247, 251, 0.85); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        
        /* Section Title */
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 1.25rem;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="w-14 h-14 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4 shadow-sm"></div>
        <p class="kh-moul text-blue-900 text-lg animate-pulse" id="loadingText">កំពុងផ្ទៀងផ្ទាត់គណនី...</p>
    </div>

    <!-- Background Decoration -->
    <div class="top-hero"></div>

    <!-- Main Content -->
    <div class="relative z-10 max-w-5xl mx-auto px-4 py-8 hidden" id="mainContent">
        
        <!-- Header Actions -->
        <div class="flex justify-between items-center mb-8 text-white">
            <a href="index.html" class="inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg backdrop-blur-sm font-medium transition text-sm shadow-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> ត្រឡប់ទៅទំព័រដើម
            </a>
            <h1 class="kh-moul text-xl tracking-wide text-white/90 hidden sm:block">គណនីរបស់អ្នកប្រើប្រាស់</h1>
        </div>

        <form id="profileForm" class="space-y-6">
            
            <!-- 1. Profile Identity Card -->
            <div class="pro-card p-6 md:p-8 mt-12 relative">
                <div class="flex flex-col md:flex-row items-start md:items-end gap-6 md:gap-8 -mt-20 md:-mt-16 mb-6">
                    <!-- Avatar -->
                    <div class="relative group mx-auto md:mx-0">
                        <div class="avatar-container">
                            <i data-lucide="user" class="w-16 h-16 text-slate-300" id="avatarIcon"></i>
                            <img id="avatarPreview" src="" class="w-full h-full object-cover hidden">
                        </div>
                        <label class="camera-btn">
                            <i data-lucide="camera" class="w-5 h-5"></i>

                    </div>

                    <!-- Personal Info Row -->

                    <div>

            <!-- 3. Location Dropdowns Card -->
            <div class="pro-card p-6 md:p-8">

                    <h3 class="text-lg font-bold kh-moul text-indigo-800">ទីតាំងរដ្ឋបាលនៃអង្គភាព</h3>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                        <input type="text" id="admin_province" class="pro-input border-indigo-200" placeholder="វាយបញ្ចូល ឬជ្រើសរើស..." autocomplete="off">

                    <div class="relative">

            <!-- 4. Security Section -->

                <div class="section-header border-orange-200">

                    </div>

                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>

                        <div class="relative flex items-center">
                            <i data-lucide="key" class="w-4 h-4 absolute left-3 text-slate-400"></i>
                            <input type="password" id="password" class="pro-input pl-10 pr-10 border-orange-200 focus:border-orange-400" placeholder=".........">
                            <button type="button" class="absolute right-3 text-slate-400 hover:text-slate-600 outline-none" onclick="window.togglePassword('password', this)">

                        </div>
                    </div>

                    <div>
                        <label class="pro-label text-orange-800">បញ្ជាក់ពាក្យសម្ងាត់ថ្មី</label>
                        <div class="relative flex items-center">
                            <i data-lucide="key-round" class="w-4 h-4 absolute left-3 text-slate-400"></i>
                            <input type="password" id="confirmPassword" class="pro-input pl-10 pr-10 border-orange-200 focus:border-orange-400" placeholder=".........">

    <!-- Firebase Script Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBU50HJrekgHWwwyLq5CTRwhjHkGJAAAfs",
            authDomain: "classroom-management-82382.firebaseapp.com",
            projectId: "classroom-management-82382",
            storageBucket: "classroom-management-82382.firebasestorage.app",
            messagingSenderId: "146641865620",
            appId: "1:146641865620:web:ce693b7b064afd5d1bdd81",
            measurementId: "G-PX867PB723"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const PTEC_APP_ID = "ptec-app";
        let currentUser = null;

        // Auto-complete variables
        let locationMaster = {};
        const adminProvinceInput = document.getElementById('admin_province');
        const adminDistrictInput = document.getElementById('admin_district');
        const adminCommuneInput = document.getElementById('admin_commune');

        const adminProvinceList = document.getElementById('admin_province_list');
        const adminDistrictList = document.getElementById('admin_district_list');
        const adminCommuneList = document.getElementById('admin_commune_list');

        lucide.createIcons();

        // UI Elements
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const mainContent = document.getElementById('mainContent');

        // Toggle Password Logic
        window.togglePassword = function(inputId, buttonEl) {
            const input = document.getElementById(inputId);
            const iconEl = buttonEl.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                iconEl.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                iconEl.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        };

        // List of all input fields IDs to save/load
        const formFields = [
            'surname', 'name', 'phone',
            'management_unit_1', 'management_unit_2', 'school_name_admin',
            'school_code', 'class_name', 'homeroom_teacher', 'gender',
            'education_level', 'training_level', 'seniority_years',
            'manager_role', 'province_for_date', 'academic_year',
            'principal_phone', 
            'admin_province', 'admin_district', 'admin_commune'
        ];

        // --- Location CSV Logic ---
        function parseCSVLine(line) {
            const delimiter = line.includes(';') ? ';' : ',';
            return line.split(delimiter).map(s => s.trim());
        }

        async function loadCSVData() {
            try {
                const response = await fetch('Data.csv');
                if (!response.ok) throw new Error('Cannot find Data.csv file');
                
                const csvText = await response.text();
                const rows = csvText.split('\n');

                for (let i = 1; i < rows.length; i++) {
                    const line = rows[i].trim();
                    if (!line) continue;
                    
                    const [province, district, commune, village] = parseCSVLine(line);
                    if (!province || province === "Province") continue;

                    if (!locationMaster[province]) locationMaster[province] = {};
                    if (district) {
                        if (!locationMaster[province][district]) locationMaster[province][district] = {};
                        if (commune) {
                            if (!locationMaster[province][district][commune]) locationMaster[province][district][commune] = new Set();
                        }
                    }
                }
                initAutocomplete();
            } catch (error) {
                console.error('Error loading CSV Data:', error);
            }
        }

        function setupAutocomplete(input, listElement, getData, onSelect) {
            const showList = () => {
                const data = getData(); 
                const filter = input.value.toLowerCase();
                listElement.innerHTML = '';
                
                const filteredData = data.filter(item => item.toLowerCase().includes(filter));
                
                if (filteredData.length > 0) {
                    listElement.style.display = 'block';
                    filteredData.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'suggestion-item';
                        li.textContent = item;
                        li.onclick = () => {
                            input.value = item;
                            listElement.style.display = 'none';
                            if (onSelect) onSelect(item);
                        };
                        listElement.appendChild(li);
                    });
                } else {
                    listElement.style.display = 'none';
                }
            };

            input.addEventListener('input', showList);
            input.addEventListener('focus', showList);

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !listElement.contains(e.target)) {
                    listElement.style.display = 'none';
                }
            });
        }

        function setupLocationCascade(pInp, pList, dInp, dList, cInp, cList) {
            setupAutocomplete(pInp, pList, () => Object.keys(locationMaster).sort(), (selected) => {
                resetInput(dInp, 'ជ្រើសរើសស្រុក/ខណ្ឌ');
                resetInput(cInp, 'ជ្រើសរើសឃុំ/សង្កាត់/ភូមិ');
                dInp.disabled = false;
                dInp.focus();
            });

            setupAutocomplete(dInp, dList, () => {
                const prov = pInp.value;
                return (prov && locationMaster[prov]) ? Object.keys(locationMaster[prov]).sort() : [];
            }, (selected) => {
                resetInput(cInp, 'ជ្រើសរើសឃុំ/សង្កាត់/ភូមិ');
                cInp.disabled = false;
                cInp.focus();
            });

            setupAutocomplete(cInp, cList, () => {
                const prov = pInp.value;
                const dist = dInp.value;
                return (prov && dist && locationMaster[prov][dist]) ? Object.keys(locationMaster[prov][dist]).sort() : [];
            }, null);
        }

        function initAutocomplete() {
            setupLocationCascade(
                adminProvinceInput, adminProvinceList,
                adminDistrictInput, adminDistrictList,
                adminCommuneInput, adminCommuneList
            );
        }

        function resetInput(input, placeholder) {
            input.value = '';
            input.placeholder = placeholder;
            input.disabled = true;
        }

        // 1. Check Auth & Load Data
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadingText.textContent = "កំពុងទាញយកទិន្នន័យ...";
                await loadCSVData();
                await loadProfileData();
                loadingOverlay.style.opacity = '0';
                setTimeout(() => { loadingOverlay.style.display = 'none'; }, 300);
                mainContent.classList.remove('hidden');
                mainContent.classList.add('animate-fade-in');
            } else {
                alert('សូមចូលគណនីជាមុនសិន!');
                window.location.href = 'index.html';
            }
        });

        async function loadProfileData() {
            try {
                const docRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'profile', 'data');
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const profile = docSnap.data();
                    
                    formFields.forEach(fieldId => {
                        if (profile[fieldId] !== undefined) {
                            const el = document.getElementById(fieldId);
                            if (el) {
                                el.value = profile[fieldId];
                                if (fieldId === 'admin_district' && profile['admin_province']) el.disabled = false;
                                if (fieldId === 'admin_commune' && profile['admin_district']) el.disabled = false;
                            }
                        }
                    });
                    
                    if (profile.image) {
                        const img = document.getElementById('avatarPreview');
                        const icon = document.getElementById('avatarIcon');
                        img.src = profile.image;
                        img.classList.remove('hidden');
                        icon.classList.add('hidden');
                    }
                }
            } catch (error) {
                console.error("Error loading profile data:", error);
            }
        }

        // 2. Handle Image Upload
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 1024 * 1024) { 
                    alert('សូមអភ័យទោស ទំហំរូបថតធំពេក (លើសពី 1MB)។ សូមជ្រើសរើសរូបថតទំហំតូចជាងនេះ។');
                    this.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('avatarPreview');
                    const icon = document.getElementById('avatarIcon');
                    img.src = event.target.result;
                    img.classList.remove('hidden');
                    icon.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // 3. Save Data to Firestore
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!currentUser) return;

            const pwd = document.getElementById('password').value;
            const confirmPwd = document.getElementById('confirmPassword').value;

            if (pwd || confirmPwd) {
                if (pwd !== confirmPwd) {
                    alert("ពាក្យសម្ងាត់ និងការបញ្ជាក់ពាក្យសម្ងាត់ មិនត្រូវគ្នាទេ។ សូមពិនិត្យម្តងទៀត!");
                    return;
                }
                try {
                    await updatePassword(currentUser, pwd);
                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                } catch (error) {
                    console.error("Password update error:", error);
                    alert("បរាជ័យក្នុងការប្តូរពាក្យសម្ងាត់! អ្នកប្រហែលជាត្រូវ Logout និង Login ម្តងទៀត ដើម្បីអាចប្តូរវាបាន (តម្រូវការសុវត្ថិភាព Firebase)។");
                    return;
                }
            }

            const profileData = {};
            
            formFields.forEach(fieldId => {
                const el = document.getElementById(fieldId);
                if (el) profileData[fieldId] = el.value;
            });

            const hasImage = !document.getElementById('avatarPreview').classList.contains('hidden');
            if (hasImage) {
                profileData.image = document.getElementById('avatarPreview').src;
            }

            const btn = document.getElementById('submitBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> កំពុងរក្សាទុក...';
            btn.disabled = true;
            lucide.createIcons();

            try {
                const docRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'profile', 'data');
                await setDoc(docRef, profileData, { merge: true });

                btn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> រួចរាល់!';
                lucide.createIcons();
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    lucide.createIcons();
                    
                    const toast = document.createElement('div');
                    toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-600 text-white px-8 py-3 rounded-full shadow-2xl z-[3000] font-bold text-sm flex items-center gap-2 animate-bounce";
                    toast.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i> បានរក្សាទុកដោយជោគជ័យ!';
                    document.body.appendChild(toast);
                    lucide.createIcons();
                    
                    setTimeout(() => toast.remove(), 3000);
                }, 1000);

            } catch (error) {
                console.error("Error saving profile to Firestore:", error);
                alert("មិនអាចរក្សាទុកបានទេ! មានបញ្ហាភ្ជាប់ទៅកាន់ Database។");
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
