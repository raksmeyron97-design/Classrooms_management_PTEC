<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTEC - ជំនួយការគ្រូបង្រៀនឌីជីថល</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Moul&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #0054a6; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f0f4f8; min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden; }
        .kh-moul { font-family: 'Moul', cursive; }
        
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 10% 20%, #e0e7ff 0%, transparent 40%), radial-gradient(circle at 90% 80%, #dcfce7 0%, transparent 40%), radial-gradient(circle at 50% 50%, #fef3c7 0%, transparent 50%); animation: moveBg 20s infinite alternate ease-in-out; }
        @keyframes moveBg { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .card-3d { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 2rem; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
        .card-3d:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.95); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); }
        
        .app-icon-container { width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 1.25rem; }

        .glowing-wrapper {
            position: relative;
            padding: 3px; 
            border-radius: 1.3rem; 
            overflow: hidden;
            background: rgba(255,255,255,0.1); 
        }

        .glowing-wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, transparent 0%, #ff2d75 25%, transparent 25%, transparent 50%, #4facfe 75%, transparent 75%, transparent 100%);
            animation: rotateGlow 4s linear infinite; z-index: 0;
        }

        .glowing-wrapper::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, transparent 0%, #ff2d75 25%, transparent 25%, transparent 50%, #4facfe 75%, transparent 75%, transparent 100%);
            animation: rotateGlow 4s linear infinite; z-index: 0; filter: blur(15px); opacity: 0.5;
        }

        .glowing-inner { position: relative; background-color: white; border-radius: 1.15rem; z-index: 10; width: 100%; height: 100%; }

        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .auth-tab.active { border-bottom: 2px solid #0054a6; color: #0054a6; font-weight: bold; }
        
        #page-loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; }
    </style>
</head>
<body>
    <!-- ផ្ទាំងផ្ទុកទិន្នន័យ (Loading) -->
    <div id="page-loader">
        <div class="w-16 h-16 border-4 border-[#0054a6] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="kh-moul text-[#0054a6] animate-pulse">កំពុងរៀបចំប្រព័ន្ធ...</p>
    </div>

    <div class="bg-animate"></div>

    <!-- ផ្ទាំង Auth -->
    <div id="auth-section" class="fixed inset-0 z-[100] hidden items-center justify-center bg-white/60 backdrop-blur-md transition-opacity duration-300">
        <div class="glowing-wrapper w-full max-w-md mx-4 shadow-2xl">
            <div class="glowing-inner bg-white p-6 md:p-8 border border-white">
                <div class="text-center mb-6">
                    <img src="https://www.ptec.edu.kh/wp-content/uploads/2020/06/cropped-PTEC_Banner-2048x459.png" alt="PTEC Logo" class="h-10 md:h-12 mx-auto mb-4 relative z-20">
                    <h2 id="auth-title" class="kh-moul text-xl text-[#0054a6]">ចូលគណនីប្រព័ន្ធ</h2>
                    <p class="text-gray-500 text-sm mt-1">ប្រព័ន្ធជំនួយការគ្រូបង្រៀនឌីជីថល</p>
                </div>

                <div id="auth-tabs" class="flex border-b border-gray-200 mb-6">
                    <button id="tab-login" class="flex-1 py-2 text-sm text-gray-500 auth-tab active transition">ចូលគណនី</button>
                    <button id="tab-register" class="flex-1 py-2 text-sm text-gray-500 auth-tab transition">បង្កើតគណនីថ្មី</button>
                </div>

                <form id="email-auth-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">អុីមែល (Email)</label>
                        <input type="email" id="email" required placeholder="name@ptec.edu.kh" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0054a6] focus:border-transparent outline-none transition bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">ពាក្យសម្ងាត់ (Password)</label>
                        <input type="password" id="password" required placeholder="••••••••" minlength="6" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0054a6] focus:border-transparent outline-none transition bg-gray-50">
                        <div class="text-right mt-1.5">
                            <button type="button" id="forgot-password-btn" class="text-xs text-[#0054a6] hover:text-blue-800 hover:underline transition font-medium">ភ្លេចពាក្យសម្ងាត់?</button>
                        </div>
                    </div>
                    
                    <button type="submit" id="main-auth-btn" class="w-full bg-[#0054a6] hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition shadow-md flex justify-center items-center mt-2">
                        <span id="btn-text">ចូលគណនី</span>
                        <i data-lucide="loader-2" id="btn-loader" class="hidden animate-spin ml-2 w-5 h-5"></i>
                    </button>
                </form>

                <div id="social-divider" class="flex items-center my-6">
                    <div class="flex-grow border-t border-gray-300"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">ឬ</span>
                    <div class="flex-grow border-t border-gray-300"></div>
                </div>

                <div id="social-buttons" class="space-y-3">
                    <button id="google-login-btn" type="button" class="w-full bg-white border border-gray-300 text-gray-700 font-semibold py-2.5 rounded-lg hover:bg-gray-50 transition shadow-sm flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>

                        </svg>
                        ចូលគណនីតាម Google

                <div id="auth-error" class="text-red-600 text-sm hidden bg-red-50 p-3 rounded-md border border-red-200 mt-4 text-center break-words"></div>

    </div>

    <!-- ផ្ទាំងមាតិកាដើម -->
    <div id="main-content" class="hidden opacity-0 transition-opacity duration-500">
        <nav class="sticky top-0 z-50 px-4 md:px-8 py-3 bg-white/90 backdrop-blur-lg border-b border-gray-100 shadow-sm relative">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <!-- លូហ្គោ (Logo) -->

            <!-- ម៉ឺនុយទម្លាក់ចុះសម្រាប់ទូរសព្ទ (Mobile Dropdown Menu) -->
            <div id="mobile-menu" class="hidden lg:hidden flex-col gap-3 mt-3 pt-3 border-t border-gray-100 text-sm font-bold text-[#0054a6] bg-white absolute left-0 right-0 px-4 pb-4 shadow-lg rounded-b-xl z-50">

                    <i data-lucide="user-circle" class="w-5 h-5"></i>
                    <span id="mobile-user-email" class="font-medium text-xs break-all">កំពុងផ្ទុក...</span>
                </div>

                <a href="#" class="flex items-center gap-2 py-2 px-2 hover:bg-gray-50 rounded-md transition">
                    <i data-lucide="home" class="w-4 h-4"></i> ទំព័រដើម
                </a>
                <a href="https://www.ptec.edu.kh/" target="_blank" class="flex items-center gap-2 py-2 px-2 hover:bg-gray-50 rounded-md transition">
                    <i data-lucide="globe" class="w-4 h-4"></i> គេហទំព័រវិទ្យាស្ថាន <i data-lucide="external-link" class="w-3 h-3 ml-auto"></i>
                </a>
                
                <button class="copy-code-btn hidden items-center justify-center gap-1.5 bg-[#eff6ff] text-blue-600 w-full py-2.5 rounded-lg transition border border-blue-100 mt-1" onclick="copyTeacherId()">
                    <i data-lucide="copy" class="w-4 h-4"></i> Copy កូដថ្នាក់
                </button>
                
                <button class="mobile-install-btn hidden bg-[#f59e0b] text-white font-bold w-full py-2.5 rounded-lg shadow-sm items-center justify-center gap-1.5 mt-1 transition-all">
                    <i data-lucide="download" class="w-4 h-4"></i> ដំឡើងកម្មវិធី (App)

                <button class="logout-btn flex items-center justify-center gap-2 text-red-600 bg-red-50 hover:bg-red-100 w-full py-2.5 rounded-lg transition font-bold mt-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i> ចាកចេញ
                </button>
            </div>
        </nav>

        <header class="pt-8 pb-8 text-center px-6">
            <h1 class="kh-moul text-2xl md:text-3xl text-[#0054a6] mb-4">ប្រព័ន្ធជំនួយការគ្រូបង្រៀនឌីជីថល</h1>
            <p class="text-[#0054a6]/80 text-sm md:text-lg font-semibold italic">គ្រប់គ្រងព័ត៌មានសិស្ស និងការបង្រៀន</p>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-4 pb-24">
            <div id="app-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
                <!-- Grid items generated by JS -->
            </div>
        </main>
    </div>

    <script>
        const apps = [
            { name: 'បញ្ចូលព័ត៌មានសិស្ស', icon: 'user-plus', url: 'enrollment_V2.html', color: 'from-blue-500 to-blue-600' },
            { name: 'បញ្ជីឈ្មោះសិស្ស', icon: 'users', url: 'student-listV2.html', color: 'from-purple-500 to-purple-600' },
            { name: 'វិភាគអាយុ និងកម្ពស់', icon: 'calendar-days', url: 'student_age_list.html', color: 'from-emerald-500 to-teal-600' },
            { name: 'ចុះវត្តមានតាមប្លង់តុ', icon: 'layout-grid', url: 'table-layout.html', color: 'from-orange-500 to-orange-600' },
            { name: 'បញ្ជីវត្តមានប្រចាំខែ', icon: 'calendar-check', url: 'attendance-1.html', color: 'from-pink-500 to-pink-600' },

            { name: 'តារាងចំណាត់ថ្នាក់', icon: 'bar-chart-3', url: 'ranking-print.html', color: 'from-purple-600 to-purple-800' },
            { name: 'វិភាគទិន្នន័យសរុប', icon: 'line-chart', url: 'data_analysing_score_student.html', color: 'from-rose-600 to-pink-700'},
            { name: 'វិភាគតាមមុខវិជ្ជា', icon: 'target', url: 'new_data_analyse_by_subject.html', color: 'from-blue-600 to-indigo-700' },
            { name: 'រដ្ឋបាលថ្នាក់រៀន', icon: 'folder-open', url: 'Main_adr.html', color: 'from-blue-700 to-indigo-800' },
            { name: 'របាយការណ៍មាតាបិតា', icon: 'book-open-check', url: 'parent-report.html', color: 'from-sky-500 to-blue-600' },
            { name: 'លេខកូដសិស្ស (ឪពុកម្តាយ)', icon: 'key', url: 'student-codes.html', color: 'from-emerald-500 to-teal-600' },
            { name: 'បញ្ចូលពិន្ទុកិច្ចការផ្ទះ', icon: 'book-marked', url: 'enter-homework-score.html', color: 'from-indigo-500 to-indigo-600' },
            { name: 'តារាងកិត្តិយស', icon: 'award', url: 'honor-roll.html', color: 'from-rose-500 to-rose-600' },
            { name: 'បញ្ជីបូកសរុបលទ្ធផលប្រចាំឆ្នាំ', icon: 'pie-chart', url: 'dashborad_score_years.html', color: 'from-cyan-500 to-cyan-600' },
            { name: 'សៀវភៅតាមដាន', icon: 'book-open', url: 'student-tracking.html', color: 'from-sky-500 to-sky-600' },
            { name: 'ទាញយកវិញ្ញាបនបត្រ', icon: 'file-badge', url: 'certificate.html', color: 'from-yellow-500 to-orange-500' },
            { name: 'កាលវិភាគសម្អាតថ្នាក់', icon: 'sparkles', url: 'cleaning-schedule.html', color: 'from-cyan-400 to-blue-500' },

            { name: 'បោះពុម្ពកាតសិស្ស', icon: 'contact-2', url: 'id_student.html', color: 'from-indigo-600 to-blue-700' },
            { name: 'ផ្ញើសារទៅកាន់អាណាព្យាបាល', icon: 'bell', url: 'teacher-notifications.html', color: 'from-red-600 to-blue-700' },

        const grid = document.getElementById('app-grid');
        
        apps.forEach(app => {
            const card = document.createElement('div');
            card.className = 'card-3d group p-4 md:p-6 flex flex-col items-center text-center select-none';
            card.onclick = () => { window.location.href = app.url; };
            
            card.innerHTML = `
                <div class="mb-3">
                    <div class="app-icon-container bg-gradient-to-tr ${app.color} shadow-md transition-transform group-hover:scale-110 duration-300">
                        <i data-lucide="${app.icon}" class="w-7 h-7 md:w-8 md:h-8 text-white"></i>

                </div>
                <h3 class="text-[11px] md:text-xs font-bold text-slate-800 leading-tight">${app.name}</h3>
            `;
            grid.appendChild(card);
        });
        
        lucide.createIcons();

        // មុខងារសម្រាប់បើក/បិទ ម៉ឺនុយលើទូរសព្ទ (Mobile Menu Toggle)
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            mobileMenu.classList.toggle('flex');
        });

    <!-- Firebase Authentication & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup,
            sendPasswordResetEmail,
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBU50HJrekgHWwwyLq5CTRwhjHkGJAAAfs",
            authDomain: "classroom-management-82382.firebaseapp.com",
            projectId: "classroom-management-82382",
            storageBucket: "classroom-management-82382.firebasestorage.app",
            messagingSenderId: "146641865620",
            appId: "1:146641865620:web:ce693b7b064afd5d1bdd81"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Elements
        const pageLoader = document.getElementById('page-loader');
        const authSection = document.getElementById('auth-section');
        const mainContent = document.getElementById('main-content');
        const authError = document.getElementById('auth-error');
        
        // ប្រើ class ជំនួស ID ព្រោះមានប៊ូតុង ២ (មួយសម្រាប់ Desktop មួយសម្រាប់ Mobile)
        const copyCodeBtns = document.querySelectorAll('.copy-code-btn');
        const logoutBtns = document.querySelectorAll('.logout-btn');
        
        const desktopUserEmail = document.getElementById('desktop-user-email');
        const mobileUserEmail = document.getElementById('mobile-user-email');

        let isLoginMode = true;
        let currentTeacherUid = '';

        const showError = (msg, isSuccess = false) => {
            authError.textContent = msg;
            if (isSuccess) {
                authError.classList.replace('bg-red-50', 'bg-green-50');
                authError.classList.replace('text-red-600', 'text-green-700');
            } else {
                authError.classList.replace('bg-green-50', 'bg-red-50');
                authError.classList.replace('text-green-700', 'text-red-600');
            }
            authError.classList.remove('hidden');
        };
        const hideError = () => authError.classList.add('hidden');

        document.getElementById('tab-login').addEventListener('click', () => {
            isLoginMode = true;
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('auth-title').textContent = "ចូលគណនីប្រព័ន្ធ";
            document.getElementById('btn-text').textContent = "ចូលគណនី";
            hideError();
        });

        document.getElementById('tab-register').addEventListener('click', () => {
            isLoginMode = false;
            document.getElementById('tab-register').classList.add('active');
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('auth-title').textContent = "បង្កើតគណនីថ្មី";
            document.getElementById('btn-text').textContent = "ចុះឈ្មោះ (Register)";
            hideError();
        });

        // Track Authentication State
        onAuthStateChanged(auth, (user) => {
            pageLoader.style.display = 'none'; 
            
            if (user && !user.isAnonymous) {
                currentTeacherUid = user.uid;
                
                // បង្ហាញអ៊ីមែលនៅលើ Navbar
                desktopUserEmail.textContent = user.email;
                mobileUserEmail.textContent = user.email;
                
                authSection.style.display = 'none';
                mainContent.classList.remove('hidden');
                setTimeout(() => mainContent.classList.remove('opacity-0'), 50); 
                
                // បង្ហាញប៊ូតុង Copy លេខកូដ ទាំង២
                copyCodeBtns.forEach(btn => {
                    btn.classList.remove('hidden');
                    btn.classList.add('flex');
                });
            } else {
                currentTeacherUid = '';
                
                mainContent.classList.add('hidden');
                mainContent.classList.add('opacity-0');
                authSection.style.display = 'flex';
                authSection.classList.remove('hidden');
                
                // លាក់ប៊ូតុង Copy លេខកូដ ទាំង២
                copyCodeBtns.forEach(btn => {
                    btn.classList.add('hidden');
                    btn.classList.remove('flex');
                });
            }
        });

        document.getElementById('email-auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            hideError();

            try {
                if (isLoginMode) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
            } catch (error) {
                showError('អុីមែល ឬពាក្យសម្ងាត់មិនត្រឹមត្រូវឡើយ។');
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            hideError();
            try { await signInWithPopup(auth, provider); } 
            catch (error) { showError('ការចូលដោយប្រើ Google មិនជោគជ័យ។'); }
        });

        // ដាក់មុខងារ Logout លើប៊ូតុងទាំង២ (Desktop & Mobile)
        logoutBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if(confirm('តើអ្នកពិតជាចង់ចាកចេញពីប្រព័ន្ធមែនទេ?')) signOut(auth);
            });
        });

        // --- មុខងារ Copy លេខកូដ (UID) ---
        window.copyTeacherId = function() {
            if (!currentTeacherUid) return;
            copyFallback(currentTeacherUid, "លេខកូដថ្នាក់រៀន");
            
            // បិទម៉ឺនុយទូរសព្ទបន្ទាប់ពីចុច Copy រួច
            const mobileMenu = document.getElementById('mobile-menu');
            if(!mobileMenu.classList.contains('hidden')){
                mobileMenu.classList.add('hidden');
                mobileMenu.classList.remove('flex');
            }
        };

        function copyFallback(text, label = "លេខកូដ") {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert(`✅ បានចម្លង${label}៖ ` + text);
            } catch (err) {
                alert('បរាជ័យក្នុងការ Copy។ សូម Copy លេខកូដដោយផ្ទាល់។');
            }
            document.body.removeChild(textArea);
        }

        // PWA Install Logic
        let deferredPrompt;
        const installBtns = document.querySelectorAll('.mobile-install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtns.forEach(btn => btn.classList.remove('hidden'));
        });

        const handleInstallClick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtns.forEach(btn => btn.classList.add('hidden'));
            }
        };

        installBtns.forEach(btn => btn.addEventListener('click', handleInstallClick));
    </script>
</body>
</html>
